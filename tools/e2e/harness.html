<!doctype html>
<meta charset="utf-8">
<title>keiri-tools E2E harness</title>
<!--
  公開中の3ツールを **実ブラウザで・実ページのまま** 動かす結合テスト。
  ツールのHTMLは1行も改変せず、同一オリジンのiframeに読み込んでユーザーと同じ操作
  (値を入れる→ボタンを押す→描画された結果を読む)をする。

  なぜ要るか: 単体テスト(tests/*.mjs)が見ているのは assets/*_core.js の純ロジックだけで、
  ページ内の <script type="module"> ── 入力の読み取り・fetchしたデータの適用・結果の描画 ──
  は**どのテストも通っていなかった**。Chrome拡張で同じ空白から実バグ(取引先に「販売: 」が
  混入)が出た実績があるので、同じ手当てをツール側にも入れる。
-->
<body style="margin:0;font:14px system-ui">
<iframe id="f" style="width:1100px;height:1000px;border:0"></iframe>
<script type="module">
const q = new URLSearchParams(location.search);
const scene = q.get("scene");

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

/** 条件が真になるまで待つ(タイミング勘に頼らない) */
async function waitFor(fn, label, timeout = 8000) {
  const t0 = Date.now();
  for (;;) {
    let v;
    try { v = fn(); } catch { v = null; }
    if (v) return v;
    if (Date.now() - t0 > timeout) throw new Error(`待っても起きなかった: ${label}`);
    await sleep(20);
  }
}

/** ツールのページをiframeで開く。load後は「ユーザーが見ている状態」 */
let openedPage = null; // どのページを実際に開いたか(E2Eの網羅チェックに使う。下の coverage 参照)
function open(path) {
  openedPage = path;
  const f = document.getElementById("f");
  return new Promise((ok, ng) => {
    f.addEventListener("load", () => ok(f.contentDocument), { once: true });
    f.addEventListener("error", () => ng(new Error("iframe load error")), { once: true });
    f.src = path;
  });
}

const set = (doc, id, v) => {
  const el = doc.getElementById(id);
  el.value = v;
  el.dispatchEvent(new doc.defaultView.Event("input", { bubbles: true }));
  el.dispatchEvent(new doc.defaultView.Event("change", { bubbles: true }));
  return el;
};
const click = (doc, id) => doc.getElementById(id).click();
const text = (doc, id) => doc.getElementById(id).textContent.replace(/\s+/g, " ").trim();

// チェックボックスを実ユーザーと同じように操作する(change を発火させる)
const check = (doc, id, on) => {
  const el = doc.getElementById(id);
  if (el.checked !== !!on) el.click();
  return el;
};

const pickRadio = (doc, name, value) => {
  const r = doc.querySelector(`input[name="${name}"][value="${value}"]`);
  r.checked = true;
  r.dispatchEvent(new doc.defaultView.Event("change", { bubbles: true }));
};

// ── 銀行休業日の判定(ハーネス側の独立実装。ツール側のロジックは信用しない) ──────────
// テストが被検体と同じ関数を使うと「両方同じように間違える」ので、ここでは素朴に書き直す。
const isBankHoliday = (iso, holidays) => {
  const [y, m, d] = iso.split("-").map(Number);
  const dow = new Date(y, m - 1, d).getDay();
  if (dow === 0 || dow === 6) return true;          // 土日
  if (m === 12 && d === 31) return true;            // 年末年始
  if (m === 1 && d <= 3) return true;
  return Object.prototype.hasOwnProperty.call(holidays, iso); // 祝日
};

/**
 * 営業日数の独立実装(土日+祝日を休みとする。年末年始オプションはOFF前提)。
 * eigyobi_core は一切使わない — 被検体と同じ関数で数えたら、祝日を落としていても両方同じ答えになる。
 */
const countBusinessIndep = (fromIso, toIso, holidays) => {
  const [fy, fm, fd] = fromIso.split("-").map(Number);
  const [ty, tm, td] = toIso.split("-").map(Number);
  let business = 0, hol = 0, total = 0;
  const end = Date.UTC(ty, tm - 1, td);
  for (let t = Date.UTC(fy, fm - 1, fd); t <= end; t += 86400000) {
    const dt = new Date(t);
    const iso = dt.toISOString().slice(0, 10);
    const w = dt.getUTCDay();
    const isHol = Object.prototype.hasOwnProperty.call(holidays, iso);
    total++;
    if (isHol) hol++;
    if (w !== 0 && w !== 6 && !isHol) business++;
  }
  return { business, holidays: hol, total };
};

/** 支払サイト表を読む → [{payIso, dow, moved}] */
function readPaydayRows(doc) {
  const trs = [...doc.querySelectorAll("#out table tr")].slice(1); // 1行目はヘッダ
  return trs.map((tr) => {
    const tds = tr.querySelectorAll("td");
    const m = tds[1].textContent.match(/(\d{4})\/(\d{2})\/(\d{2})\s*\((.)\)/);
    return {
      payIso: `${m[1]}-${m[2]}-${m[3]}`,
      dow: m[4],
      moved: /営業日調整/.test(tds[2].textContent),
    };
  });
}

// ── シーン ────────────────────────────────────────────────────────────────
const SCENES = {
  // 銀行プリセットを選ぶと手数料欄が本当に埋まるか(fetch→select→input の配線)
  async senpou_preset() {
    const doc = await open("/docs/senpou-futan/");
    const banks = await (await fetch("/docs/assets/fee_table.json?raw=1")).json();
    const i = banks.banks.findIndex((b) => b.under30k !== b.over30k); // 3万円で段のある銀行
    const bank = banks.banks[i];

    await waitFor(() => doc.getElementById("bankPreset").options.length > 1, "銀行プリセットの読み込み");
    set(doc, "bankPreset", String(i));
    const filled = {
      under: doc.getElementById("feeUnder").value,
      over: doc.getElementById("feeOver").value,
    };

    pickRadio(doc, "method", "sueoki");
    set(doc, "invoice", "30000"); // ちょうど3万円 = 据置型なら「3万円以上」の手数料
    click(doc, "calc");
    return {
      bank: bank.name, filled,
      expectFilled: { under: String(bank.under30k), over: String(bank.over30k) },
      result: text(doc, "result"),
      expectTransfer: (30000 - bank.over30k).toLocaleString("ja-JP"),
    };
  },

  // 3万円境界の「不定帯」で3方式の併記が出るか
  async senpou_disagree() {
    const doc = await open("/docs/senpou-futan/");
    pickRadio(doc, "method", "sueoki");
    set(doc, "feeUnder", "110");
    set(doc, "feeOver", "330");
    set(doc, "invoice", "30200"); // 据置=330 / 未満加算=330 / 以上加算=110 → 割れる
    click(doc, "calc");
    return { result: text(doc, "result") };
  },

  // 入金差額チェック(550円=一律差引の商慣行)
  async senpou_check() {
    const doc = await open("/docs/senpou-futan/");
    set(doc, "chkInvoice", "100000");
    set(doc, "chkReceived", "99450");
    click(doc, "check");
    return { result: text(doc, "checkResult") };
  },

  // 全銀カナ: 変換が描画されるか + 入力のHTMLがエスケープされるか
  async zengin() {
    const doc = await open("/docs/zengin-kana/");
    set(doc, "names", '株式会社ヤマダ商事\n<img src=x onerror="window.__pwned=1">');
    click(doc, "run");
    await waitFor(() => doc.querySelectorAll("#out div").length > 0, "変換結果の描画");
    return {
      out: text(doc, "out"),
      injectedImg: doc.querySelectorAll("#out img").length, // 0でなければエスケープ漏れ
      pwned: !!doc.defaultView.__pwned,
      copyShown: doc.getElementById("copyAll").style.display === "block",
    };
  },

  // 一括コピーは総合振込ファイルへの貼り付けが前提。未変換の行(漢字が残っている・30文字超)を
  // そのままクリップボードに載せると、銀行で弾かれるか名義相違で組戻しになる。
  // clipboardを差し替えて「何が実際に書き込まれたか」を見る(画面の警告だけでは足りない)。
  async zengin_ng_copy() {
    const doc = await open("/docs/zengin-kana/");
    const win = doc.defaultView;
    const writes = [];
    Object.defineProperty(win.navigator, "clipboard", {
      configurable: true,
      value: { writeText: async (t) => { writes.push(t); } },
    });
    // 1行目=正常 / 2行目=漢字が残る / 3行目=30文字超
    set(doc, "names", "株式会社ニトリ\n株式会社山田商店\nカブシキガイシヤ テストコーポレーシヨンジヤパンホールデイングス");
    click(doc, "run");
    await waitFor(() => doc.querySelectorAll("#out div").length > 0, "変換結果の描画");
    click(doc, "copyAll");                       // 既定ではコピーを止めるはず
    const blocked = writes.length === 0;
    const errText = text(doc, "copyErr");
    click(doc, "forceCopy");                     // 承知のうえで強行する導線
    await waitFor(() => writes.length > 0, "強制コピー");
    return {
      blocked,                                   // false なら未変換行が黙って外へ出ている
      errText,
      forced: writes[0] || "",
      forcedLines: (writes[0] || "").split("\n").length, // 行を間引くと取引先リストとズレる
    };
  },

  // 支払サイト: 描画された支払予定日が1つでも銀行休業日ならNG。
  // 5日払いにすると、どの12ヶ月窓にも必ず 5/5(こどもの日) が入る = 常設の祝日プローブになる。
  async payday() {
    const doc = await open("/docs/shiharai-site/");
    const holidays = await (await fetch("/docs/assets/holidays_jp.json?raw=1")).json();
    set(doc, "closing", "末");
    set(doc, "offset", "1");   // 月末締め翌月5日払い
    set(doc, "payday", "5");
    pickRadio(doc, "adjust", "prev");
    click(doc, "calc"); // ← 祝日データの到着を待たずに押す(実ユーザーと同じ)
    await waitFor(() => doc.querySelectorAll("#out table tr").length > 1, "支払予定表の描画");
    const rows = readPaydayRows(doc);
    return {
      rows: rows.length,
      onHoliday: rows.filter((r) => isBankHoliday(r.payIso, holidays)), // ここが空でなければ実バグ
      mayRow: rows.find((r) => r.payIso.slice(5, 7) === "05") || null,
      warn: text(doc, "out").includes("読み込めませんでした"),
      // 祝日を知らずに答えている行は「⚠︎ 概算」と申告されているはず
      beyondRows: doc.querySelectorAll("#out table td span[title]").length,
      noteText: [...doc.querySelectorAll("#out .note")].map((n) => n.textContent).join(" "),
    };
  },
};
// 同じ操作を、祝日JSONの配信を変えて撮る:
//   payday_slow   … 800ms遅らせる(モバイル回線。届く前にボタンを押される)
//   payday_nodata … 404(配信失敗)
//   payday_stale  … 2025年までしか収録が無い(データが古びた将来の姿)
SCENES.payday_slow = SCENES.payday;
SCENES.payday_nodata = SCENES.payday;
SCENES.payday_stale = SCENES.payday;

// 営業日計算: 「祝日を除いて数える」ことがこのツールの存在意義そのもの。
// 祝日データが効いていなければ必ず数がズレる期間を選ぶ = 常設の祝日プローブ。
// GW(5/1〜5/10)は祝日が4日入るので、祝日を落とすと営業日が 3 → 6 に倍増する。
const eigyobiScene = (FROM, TO) => async () => {
  const doc = await open("/docs/eigyobi/");
  const holidays = await (await fetch("/docs/assets/holidays_jp.json?raw=1")).json();
  set(doc, "from", FROM);
  set(doc, "to", TO);
  click(doc, "calc"); // ← 祝日データの到着を待たずに押す(実ユーザーと同じ)
  await waitFor(() => text(doc, "result").includes("営業日"), "営業日の描画");
  const body = text(doc, "result");
  const m = body.match(/営業日\s*([\d,]+)\s*日/);
  return {
    range: `${FROM}〜${TO}`,
    business: m ? Number(m[1].replace(/,/g, "")) : null,
    expected: countBusinessIndep(FROM, TO, holidays), // ハーネス側の独立実装
    warn: body.includes("読み込めませんでした"),
    beyond: body.includes("概算"),
    body,
  };
};
SCENES.eigyobi = eigyobiScene("2026-05-01", "2026-05-10");
SCENES.eigyobi_slow = SCENES.eigyobi;    // 800ms遅らせる(モバイル回線)
SCENES.eigyobi_nodata = SCENES.eigyobi;  // 404(配信失敗)
SCENES.eigyobi_beyond = eigyobiScene("2028-05-01", "2028-05-10"); // 収録範囲外の年

// ── 有給休暇: 月末入社の付与日 ───────────────────────────────────────────────
// 8/31入社の6ヶ月後は「2/31」が無い。JSの日付繰り越しに任せると 3/3 になり、
// **法定より遅い付与日**を答える(年5日の取得義務の起算も遅れる)。
// 正: 応当日が無い月はその月の末日 = 2/28 (民法143条2項)。閏年なら2/29。
// yukyu_core は使わない — 被検体と同じ関数で期待値を作ったら、両方同じように間違える。
const lastDayIndep = (y, m) => {
  const leap = (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
  return [31, leap ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][m - 1];
};
const jp = (iso) => iso.replaceAll("-", "/");
const yukyuScene = (HIRE, WDAYS, WHOURS) => async () => {
  const doc = await open("/docs/yukyu/");
  set(doc, "hire", HIRE);
  set(doc, "wdays", String(WDAYS));
  set(doc, "whours", String(WHOURS));
  click(doc, "calc");
  await waitFor(() => text(doc, "result").includes("付与"), "付与結果の描画");
  const body = text(doc, "result");

  const [hy, hm, hd] = HIRE.split("-").map(Number);
  const tm = ((hm - 1 + 6) % 12) + 1;
  const ty = hy + Math.floor((hm - 1 + 6) / 12);

  // 正: 応当日が無ければその月の末日（民法143条2項）
  const legal = `${ty}-${String(tm).padStart(2, "0")}-${String(Math.min(hd, lastDayIndep(ty, tm))).padStart(2, "0")}`;
  // 誤: JSの日付繰り越しに任せたときに出る日（2/31 → 3/3）。これが画面に出たら即アウト
  const carried = (() => {
    const t = new Date(hy, hm - 1 + 6, hd);
    return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}-${String(t.getDate()).padStart(2, "0")}`;
  })();

  return {
    hire: HIRE, legal, carried,
    showsLegal: body.includes(jp(legal)),                       // 法定の付与日を出しているか
    showsCarried: carried !== legal && body.includes(jp(carried)), // 繰り越した日を出していないか
    clampNote: body.includes("末日"),                           // 末日に丸めたことを申告しているか
    body,
  };
};
// 8/31入社 = 6ヶ月後が2月(28/29日)。繰り越しバグが最大3日ズレる常設プローブ。
// 入社日は過去に固定 = 実行日に依存しないテストになる（第3便の教訓）
SCENES.yukyu_monthend = yukyuScene("2020-08-31", 5, 40);       // → 2021-02-28（誤: 03-03）
SCENES.yukyu_monthend_leap = yukyuScene("2019-08-31", 5, 40);  // → 2020-02-29（閏年）
SCENES.yukyu_normal = yukyuScene("2020-04-01", 5, 40);         // → 2020-10-01（丸めない）

// ── 消費税・端数処理 ────────────────────────────────────────────────
// 期待値は shohizei_core を使わず BigInt の厳密整数で作る(被検体と同じ式で照合しない)。
const taxIndep = (amount, num, den) => Number((BigInt(amount) * BigInt(num)) / BigInt(den)); // 切捨て

/** 明細の行を rows の内容ちょうどにして計算させる */
const fillLines = (doc, rows) => {
  const addBtn = doc.getElementById("add-line");
  let have = doc.querySelectorAll(".inv-line").length;
  while (have < rows.length) { addBtn.click(); have++; }
  const lines = [...doc.querySelectorAll(".inv-line")];
  // 余った行は削除
  for (let i = rows.length; i < lines.length; i++) lines[i].querySelector(".l-del").click();
  const live = [...doc.querySelectorAll(".inv-line")];
  rows.forEach((r, i) => {
    const row = live[i];
    row.querySelector(".l-name").value = r.name || "";
    const amt = row.querySelector(".l-amount");
    amt.value = String(r.amount);
    amt.dispatchEvent(new doc.defaultView.Event("input", { bubbles: true }));
    row.querySelector(".l-rate").value = r.rate;
  });
};

// 国税庁 インボイスQ&A 問57 の記載例そのもの。税込100,000円 / 10%と8%の混在。
// 10%対象 60,000 → 5,454円 / 8%対象 40,000 → 2,962円 / 合計 8,416円
SCENES.shohizei_invoice = async () => {
  const doc = await open("/docs/shohizei/");
  pickRadio(doc, "inv-dir", "included");
  fillLines(doc, [
    { name: "小麦粉", amount: 5000, rate: "reduced" },
    { name: "牛肉", amount: 8000, rate: "reduced" },
    { name: "その他(8%)", amount: 27000, rate: "reduced" },
    { name: "キッチンペーパー", amount: 2000, rate: "standard" },
    { name: "その他(10%)", amount: 58000, rate: "standard" },
  ]);
  doc.getElementById("inv-mode").value = "floor";
  click(doc, "inv-calc");
  await waitFor(() => text(doc, "inv-result").includes("消費税額"), "請求書の計算結果");
  const body = text(doc, "inv-result");

  // ハーネス側の独立計算(税率ごとに合計してから1回だけ切捨て)
  const std = taxIndep(60000, 10, 110);   // 5454
  const red = taxIndep(40000, 8, 108);    // 2962
  return {
    body,
    expected: { std, red, total: std + red },   // 5454 / 2962 / 8416
    shownTotal: text(doc, "inv-tax"),
    showsStd: body.includes(std.toLocaleString("ja-JP")),
    showsRed: body.includes(red.toLocaleString("ja-JP")),
    showsTotal: text(doc, "inv-tax").includes((std + red).toLocaleString("ja-JP")),
  };
};

// 明細ごとの端数処理(認められない方法)との差が、ちゃんと警告として出ること。
// 105円 × 10% = 10.5 → 行ごとに切り捨てると10円。10行で100円だが、正しくは 1,050×10% = 105円。
SCENES.shohizei_perline = async () => {
  const doc = await open("/docs/shohizei/");
  pickRadio(doc, "inv-dir", "excluded");
  fillLines(doc, Array.from({ length: 10 }, (_, i) => ({ name: `品${i}`, amount: 105, rate: "standard" })));
  doc.getElementById("inv-mode").value = "floor";
  click(doc, "inv-calc");
  await waitFor(() => text(doc, "inv-result").includes("消費税額"), "請求書の計算結果");
  const body = text(doc, "inv-result");
  return {
    body,
    correct: taxIndep(1050, 10, 100),          // 105
    perLine: 10 * taxIndep(105, 10, 100),      // 100
    showsCorrect: text(doc, "inv-tax").includes("105"),
    warns: /認められていません/.test(body) && /明細ごと/.test(body),
    showsPerLine: body.includes("100"),
  };
};

// 税込→税額。99円は「真の答えがちょうど9円」= 素朴な浮動小数点実装(税込/1.1*0.1)が
// 8円を返す値。ページ側が ×10/110 以外の書き方に変わったら、ここで落ちる常設プローブ。
const convertScene = (AMOUNT, DIR, RATE) => async () => {
  const doc = await open("/docs/shohizei/");
  pickRadio(doc, "dir", DIR);
  pickRadio(doc, "rate", RATE);
  set(doc, "amount", String(AMOUNT));
  doc.getElementById("mode").value = "floor";
  click(doc, "calc");
  await waitFor(() => text(doc, "result").includes("消費税額"), "税込税抜の計算結果");

  const num = (id) => Number(text(doc, id).replace(/[^0-9]/g, ""));
  const [n, d] = RATE === "standard"
    ? (DIR === "included" ? [10, 110] : [10, 100])
    : (DIR === "included" ? [8, 108] : [8, 100]);
  const expectedTax = taxIndep(AMOUNT, n, d);
  const tax = num("r-tax"), excluded = num("r-excluded"), included = num("r-included");
  return {
    amount: AMOUNT, dir: DIR, rate: RATE,
    tax, excluded, included, expectedTax,
    taxOk: tax === expectedTax,
    // 画面の3つの数字が足し算で閉じていること(閉じないと利用者が必ず気付く)
    reconciles: excluded + tax === included,
    anchorOk: DIR === "included" ? included === AMOUNT : excluded === AMOUNT,
  };
};
SCENES.shohizei_convert_99 = convertScene(99, "included", "standard");      // → 税額9円(素朴実装は8円)
SCENES.shohizei_convert_incl = convertScene(10780, "included", "standard"); // → 980円
SCENES.shohizei_convert_excl = convertScene(1234, "excluded", "reduced");   // → 98円(8%)

// ── 申告(割戻し/積上げ) ──────────────────────────────────────────────
// 納付税額の期待値はハーネス側で独立に組む(shohizei_core を使わない)。
const declIndep = (salesTax, purchaseTax) => {
  const floorUnit = (v, u) => (v / BigInt(u)) * BigInt(u);
  const raw = BigInt(salesTax) - BigInt(purchaseTax);
  const national = raw >= 0n ? floorUnit(raw, 100) : raw;
  const local = floorUnit((national * 22n) / 78n, 100);
  return { national: Number(national), local: Number(local), total: Number(national + local) };
};

// 売上 税込11,000,000(10%) → 課税標準額10,000,000 → 売上税額 780,000
// 仕入 受領インボイスの消費税額等 500,000 → 積上げ → 390,000
// 差引 390,000 / 地方 110,000 / 納付 500,000
SCENES.shohizei_shinkoku = async () => {
  const doc = await open("/docs/shohizei/");
  set(doc, "s10", "11000000");
  set(doc, "s-inv", "1000000");   // 積上げも比較できるように入れる
  set(doc, "p10", "5500000");
  set(doc, "p-inv", "500000");
  click(doc, "dec-calc");
  await waitFor(() => text(doc, "dec-result").includes("納付税額"), "申告の計算結果");

  const body = text(doc, "dec-result");
  const num = (id) => Number(text(doc, id).replace(/[^0-9-]/g, ""));

  // 独立オラクル: 売上は割戻し(税込×100/110→千円未満切捨て→×7.8%)、仕入は積上げ(×78/100)
  const base = Number((11000000n * 100n) / 110n / 1000n * 1000n); // 10,000,000
  const salesTax = Number((BigInt(base) * 78n) / 1000n);          // 780,000
  const purchaseTax = Number((500000n * 78n) / 100n);             // 390,000
  const want = declIndep(salesTax, purchaseTax);

  // 「選択肢として提示している組み合わせ」は比較表の行だけ。
  // 結果ブロック全体を正規表現で見ると、末尾の注意書き
  // (「売上=積上げ × 仕入=割戻し は認められない」)を"提示している"と誤検知する。
  const comboLabels = [...doc.querySelectorAll("#dec-result table tr")]
    .map((tr) => (tr.querySelector("td")?.textContent || "").replace(/\s+/g, " ").trim())
    .filter((t) => t.includes("売上="));

  return {
    body,
    want,
    comboLabels,
    national: num("dec-national"),
    local: num("dec-local"),
    total: num("dec-total"),
    // 認められない組み合わせを選択肢として出していないこと(出したら規定違反を勧めることになる)
    offersForbidden: comboLabels.some((l) => /売上=積上げ × 仕入=割戻し/.test(l)),
    showsThree: comboLabels.length === 3,
    // 注意書きとしては、なぜ出さないのかを説明していること
    explainsForbidden: /認められない/.test(body) && /6391/.test(body),
  };
};

// ── 給与の源泉徴収(月額表) ──────────────────────────────────────────────────
// このツールの存在意義は「国税庁PDFの税額表を引く代わりをする」こと。表が効いていなければ
// 必ず額がズレる。**期待値はハーネス側で生の月額表JSONを独立に引いて出す**
// (被検体と同じ gensen_kyuyo_core.js を使うと、coreのバグで両方同じように間違える)。
const lookupIndep = (table, A, n, ran) => {
  if (ran === "otsu") {
    if (A < table.otsuLowMax) return Math.floor(A * table.otsuLowRate);
    const row = table.rows.find((r) => A >= r.min && A < r.max);
    return row ? row.otsu : null;
  }
  if (A < table.otsuLowMax) return 0;
  const row = table.rows.find((r) => A >= r.min && A < r.max);
  return row ? row.kou[Math.min(n, 7)] : null;
};

const kyuyoScene = (A, n, ran = "kou") => async () => {

  click(doc, "calcK"); // ← 税額表の到着を待たずに押す(実ユーザーと同じ)

  // 金額は「¥3,140」形式で描かれる(「円」の字は出ない)。待ち受ける文字列を間違えると
  // 商品が正しくてもタイムアウトする(実際にやった)ので、結果ブロックの見出しで待つ
  await waitFor(
    () => /源泉徴収税額|読み込めませんでした/.test(text(doc, "resultK")),
    "給与の計算結果",
  );
  const body = text(doc, "resultK");
  // 「源泉徴収税額」の行に出ている額(最初の大きな数字)を読む
  const m = body.match(/源泉徴収税額（[^）]*）\s*¥([\d,]+)/);
  return {
    A, n, ran,
    tax: m ? Number(m[1].replace(/,/g, "")) : null,
    expected: lookupIndep(table, A, n, ran), // ハーネス側の独立実装
    year: table.year,
    showsYear: body.includes(table.year),      // どの年分の表を引いたかを申告しているか
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ── 賞与の源泉徴収(算出率の表) ───────────────────────────────────────────────
// 賞与は月額表ではなく「算出率の表」で**率**を引く。率を決めるのは**前月の給与**。
// ここでも期待値はハーネス側で生JSONを独立に引いて出す(被検体のcoreを使わない)。
const rateIndep = (t, zengetsu, n, ran) => {
  const inBand = (b, y) =>
    y >= (b.min == null ? 0 : b.min * 1000) && (b.max == null || y < b.max * 1000);
  if (ran === "otsu") {
    const row = t.rows.find((r) => r.otsu && inBand(r.otsu, zengetsu));
    return row ? row.rate : null;
  }
  const row = t.rows.find((r) => inBand(r.kou[Math.min(n, 7)], zengetsu));
  return row ? row.rate : null;
};

const shoyoScene = (p) => async () => {
  const doc = await open("/docs/gensen-choshu/");
  const [st, mt] = await Promise.all([
    (await fetch("/docs/assets/gensen_shoyo_r08.json?raw=1")).json(),
    (await fetch("/docs/assets/gensen_getsugaku_r08.json?raw=1")).json(),
  ]);

  doc.getElementById("tab-shoyo").click();
  if (p.ran === "otsu") doc.querySelector('input[name="ranS"][value="otsu"]').click();
  set(doc, "shoyoAmt", String(p.shoyo));
  set(doc, "shoyoIns", String(p.shoyoIns || 0));
  set(doc, "zenAmt", String(p.zengetsu || 0));
  set(doc, "zenIns", String(p.zengetsuIns || 0));
  if (p.ran !== "otsu") set(doc, "fuyoS", String(p.n || 0));
  click(doc, "calcS"); // ← 表の到着を待たずに押す(実ユーザーと同じ)

  await waitFor(
    () => /源泉徴収税額|読み込めませんでした|入力を確認/.test(text(doc, "resultS")),
    "賞与の計算結果",
  );
  const body = text(doc, "resultS");
  const m = body.match(/源泉徴収税額（[^）]*）\s*¥([\d,]+)/);

  // ハーネス側の独立計算
  const shoyoAfter = Math.max(0, p.shoyo - (p.shoyoIns || 0));
  const zenAfter = Math.max(0, (p.zengetsu || 0) - (p.zengetsuIns || 0));
  let expected, viaGetsugaku = false;
  if (shoyoAfter > zenAfter * 10) {
    // 10倍超 → 月額表による例外計算(÷6 → +前月 → 月額表 → −前月の税額 → ×6)
    viaGetsugaku = true;
    const per = Math.floor(shoyoAfter / 6);
    const t1 = lookupIndep(mt, per + zenAfter, p.n || 0, p.ran || "kou");
    const t2 = zenAfter > 0 ? lookupIndep(mt, zenAfter, p.n || 0, p.ran || "kou") : 0;
    expected = Math.max(0, t1 - t2) * 6;
  } else {
    const rate = rateIndep(st, zenAfter, p.n || 0, p.ran || "kou");
    expected = Math.floor((shoyoAfter * rate) / 100000);
  }

  return {
    ...p,
    tax: m ? Number(m[1].replace(/,/g, "")) : null,
    expected,
    viaGetsugaku,
    // 例外計算に入ったことを画面が申告しているか(黙って別の計算をしない)
    declaresGetsugaku: /算出率の表を使えません/.test(body),
    showsYear: body.includes(st.year),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// 需要が最大(23,980回/月)の看板ツールなのに、E2Eシーンが1つも無かった(2026-07-13 第14便)。
// **期待値は協会けんぽの公式PDFから機械抽出した保険料額表**(tests/fixtures/kyoukaikenpo_tokyo_r08.json)
// を独立オラクルにする。被検体と同じ shaho_core.js で期待値を作ると、coreのバグで両方同じように
// 間違える(第3便からの規律)。額表は「全額/折半額」を銭単位で持つ公式の値なので、
// 料率・等級・端数処理のどれが壊れても必ず落ちる。
// 雇用保険の**独立オラクル**: 厚労省が公表した「労働者負担」そのもの(1000分率)。
// 出典: 厚生労働省「令和8年度 雇用保険料率のご案内」(LL080312保01)
//   https://www.mhlw.go.jp/content/001692566.pdf
// ★ツールの shaho_rates_r08.json も shaho_core.js の導出式も通らない値をここに置く。
//   (ツールは total と 二事業 から (13.5-3.5)/2 と**導出**する。導出が壊れればここと合わなくなる)
const KOYOU_WORKER_PERMILLE = { general: 5, agri_sake: 6, construction: 6 };

const shahoScene = ({ monthly, age, bonus = 0, standard = null, gyoshu = null }) => async () => {
  const doc = await open("/docs/shakai-hoken/");
  const kenpo = await (await fetch("/tests/fixtures/kyoukaikenpo_tokyo_r08.json?raw=1")).json();

  set(doc, "monthly", String(monthly));
  set(doc, "age", String(age));
  if (bonus > 0) set(doc, "bonus", String(bonus));
  // 業種を変えるシーンだけは、選択肢が描かれるのを待ってから選ぶ(選択肢は料率JSONから作られる)。
  // 既定(一般の事業)のシーンは待たずに押す ＝ 実ユーザーと同じ「到着前に押す」経路を残す
  if (gyoshu) {
    await waitFor(() => doc.querySelector(`#gyoshu option[value="${gyoshu}"]`), "業種の選択肢");
    set(doc, "gyoshu", gyoshu);
  }
  click(doc, "calc"); // ← 料率JSONの到着を待たずに押す(実ユーザーと同じ)

  await waitFor(
    () => /本人負担|読み込めませんでした/.test(text(doc, "result")),
    "社会保険料の計算結果",
  );
  const body = text(doc, "result");

  // 公式額表(東京)から健保・支援金・厚年の本人負担を組む。
  // standard を明示できる(報酬月額 305,000 は等級としては 300,000 になる、のような入力を試すため)
  const std = standard ?? monthly;
  const g = kenpo.grades.find((x) => x.standard === std);
  const kaigo = age >= 40 && age < 65;
  const shahoSelf = g
    ? Math.round((kaigo ? g.kenko_kaigo_half : g.kenko_half) + g.kosodate_half + g.kosei_half)
    : null;

  // ★雇用保険は**標準報酬月額ではなく賃金総額(monthly)**にかかる(徴収法11条1項)。
  //   ここで std でなく monthly を使うのが肝。ページが標準報酬月額を渡していれば、
  //   monthly≠std のシーン(shaho_koyou_gaku)でここと食い違って落ちる。
  //   端数は50銭以下切捨・50銭超切上
  const raw = monthly * (KOYOU_WORKER_PERMILLE[gyoshu ?? "general"] / 1000);
  const koyouSelf = (raw - Math.floor(raw)) > 0.5 ? Math.ceil(raw) : Math.floor(raw);
  const expectedSelf = shahoSelf === null ? null : shahoSelf + koyouSelf;

  const m = body.match(/毎月の本人負担\s*¥([\d,]+)/);
  // 「介護保険料の行が出ているか」は**本文への正規表現で見てはいけない**。画面は
  // 「30歳のため介護保険料はかかりません」という**否定文**にも同じ語を含むので、
  // テキスト検索では「提示」と「否定」を区別できない(第10便で同じ誤検知をした)。
  // → 結果テーブルの**行ラベル**(DOMの構造)で見る
  const rowLabels = [...doc.querySelectorAll("#result table tr")]
    .map((tr) => (tr.cells[0]?.textContent || "").trim());
  return {
    monthly, age,
    self: m ? Number(m[1].replace(/,/g, "")) : null,
    expected: expectedSelf,          // ← 公式PDF+厚労省公表値由来。ツールのコードを一切通っていない
    expectedKoyou: koyouSelf,
    kaigoApplies: kaigo,
    showsKaigoRow: rowLabels.some((l) => l.includes("介護保険")),
    showsKoyouRow: rowLabels.some((l) => l.includes("雇用保険")),
    showsYear: /令和\d+年度の料率/.test(body), // どの年度の料率で答えたかを申告しているか
    rowLabels,
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ── 失業保険(基本手当) ────────────────────────────────────────────────────────
// 期待値は**厚労省の公表式をここに書き直したもの**(kihonteate_core.js は一切通さない)。
//   出典: 厚生労働省「基本手当日額の計算式及び金額(令和7年8月1日～)」
//   https://www.mhlw.go.jp/content/001520033.pdf
//   30〜44歳: 5,340円以上13,140円以下 → y = 0.8w − 0.3{(w−5340)/(13140−5340)}w、1円未満切捨
// 所定給付日数も雇用保険法22条・23条の表からここに直接書く。
const KIHON_DAILY_INDEP = (w) => Math.floor(0.8 * w - 0.3 * ((w - 5340) / (13140 - 5340)) * w);

  const body = text(doc, "result");

  };
};

// 期待値は**国税庁が実額で公表している計算例そのもの**をここに書き写す(taishoku_core.js は一切通さない)。
//   出典: 国税庁 No.2732「退職金に対する源泉徴収」の計算例
//   例1: 退職金800万円・勤続10年2か月 → 勤続11年 → 控除440万円 → 課税退職所得180万円
//        → 源泉徴収税額 **91,890円**
// 住民税は地方税法328条の3(市町村民税6%)・50条の4(道府県民税4%)から独立に計算する。
//   課税退職所得180万円 → 市 108,000円 + 県 72,000円 = 180,000円
const NTA_REI1 = { amount: 8000000, years: 10, months: 2, kojo: 4400000, taxable: 1800000,
                   incomeTax: 91890, juminzei: 180000 };

const taishokuScene = ({ amount, years, months, officer }) => async () => {
  const doc = await open("/docs/taishokukin/");
  set(doc, "amount", String(amount));
  set(doc, "years", String(years));
  set(doc, "months", String(months));
  if (officer) check(doc, "officer", true);
  click(doc, "calc"); // ← 税率JSONの到着を待たずに押す(実ユーザーと同じ)

  await waitFor(
    () => /手取り|読み込めませんでした|税金は0円/.test(text(doc, "result")),
    "退職金の税額の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    amount, years, months,
    kojo: num(/退職所得控除額\s*¥([\d,]+)/),
    taxable: num(/課税退職所得金額\s*¥([\d,]+)/),
    incomeTax: num(/復興特別所得税\s*¥([\d,]+)/),
    juminzei: num(/住民税\s*¥([\d,]+)/),
    tedori: num(/手取り\s*¥([\d,]+)/),
    // ★あと1か月勤めたら安くなる、という看板の主張が実際に画面に出ているか
    showsOneMonth: /あと1か月勤めると、税金が¥91,155安くなります/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ── 残業代(割増賃金) ──────────────────────────────────────────────────────
// ★期待値は**神奈川労働局が実額で公表している計算例そのもの**(zangyodai_core.js は一切通さない)。
//   https://jsite.mhlw.go.jp/kanagawa-roudoukyoku/content/contents/001107232.pdf
//     「①(365-125)×8÷12＝160、②240,000÷160＝1,500」
//     「1時間あたりの賃金額が1,500円の労働者に…22時から23時までは時間外労働かつ深夜労働となるため、
//       1,500(時間給)×1.5(時間外労働1.25＋深夜労働0.25)＝**2,250円**支払わなければなりません。」
//   同じ1時間を「時間外1時間」「深夜1時間」と**重ねて**入れて2,250円になること＝この計算機の設計そのもの。
//   深夜を125%で計算していたら3,750円になり、労働局の公表額と合わない。
const RODOKYOKU = { base: 240000, holidays: 125, daily: 8, overtime: 1, night: 1, total: 2250 };

  set(doc, "overtime", String(inp.overtime));

  await waitFor(
    () => /残業代 ¥|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "残業代の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    ...inp,
    total: num(/残業代 ¥([\d,]+)/),
    // ★`\s*` を忘れないこと: th と td の textContent は**空白なしで連結**されるので
    //   「1時間あたりの単価¥1,500.00」になる(空白を要求する正規表現は、正しい画面を落とす)
    hourlyRate: num(/1時間あたりの単価\s*¥([\d,]+)/),   // 小数部の前まで取れれば十分
    // ★60時間を超えたことを画面が名指ししているか(率が上がったことに気づかない人が多い)
    showsOver60: /1か月60時間を超えた10時間は、割増率が50%になります/.test(body),
    shows50pct: /うち1か月60時間を超えた分（50%）/.test(body),

};

// ── ふるさと納税 限度額 ──────────────────────────────────────────────
// ★期待値は juminzei_core.js を一切通さず、**条文から手で積み上げた実額**を固定する。
//   年収500万・独身・社会保険料70万（実額入力）の鎖:
//     給与所得   5,000,000 − 1,440,000(=収入×20%+44万) = 3,560,000
//     課税総所得 3,560,000 − (基礎控除43万 + 社保70万)  = 2,430,000
//     所得割     2,430,000 × 10% − 調整控除2,500        =   240,500
//     20%上限    240,500 × 20%                          =    48,100
//     割合       判定額2,280,000 → **79.79%**（本則80%を附則5条の6が読み替えた値）
//     限度額     48,100 ÷ 0.7979 + 2,000                =    62,283
//   ★本則の80%で割ると62,125円、復興特別所得税を忘れて80%(=90−10)…ではなく
//     「90−所得税率」で計算しても80%になり、いずれもこの額にならない。
//     **62,283円が出る＝附則5条の6の読替えが効いている**ことの証明になる。
const furusatoScene = (inp) => async () => {
  const doc = await open("/docs/furusato/");
  // 都道府県プルダウンは料率JSONの到着後に作られる。**中身が出来る前に選ぶと空振りする**。
  // ★配信失敗を再現するシーンでは、プルダウンは**永久に出来ない**のが正しい挙動なので待たない
  //   (待つと「fail closedを検査するシーン」がタイムアウトで落ち、断り書きを一度も見ないまま終わる)
  if (!inp.nodata) {
    await waitFor(() => doc.getElementById("ken").options.length > 40, "都道府県プルダウン");
    set(doc, "ken", "東京都");
  }
  set(doc, "shunyu", String(inp.shunyu));
  set(doc, "age", String(inp.age ?? 40));
  set(doc, "shakai", inp.shakai == null ? "" : String(inp.shakai)); // 空欄 = 年収から概算させる
  set(doc, "kifu", inp.kifu == null ? "" : String(inp.kifu));
  set(doc, "fuyoNensho", String(inp.fuyoNensho ?? 0));
  click(doc, "calc");

  await waitFor(
    () => /限度額 ¥|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "限度額の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    ...inp,
    gendo: num(/限度額 ¥([\d,]+)/),
    shotokuwari: num(/住民税の所得割額¥([\d,]+)/),
    // ★附則5条の6の読替え後の割合が**画面に出ている**こと(本則80%と1桁も違わないなら意味がない)
    showsRitsu: /特例控除額の割合79\.79％/.test(body),
    // 概算を使ったときは、金額と前提を必ず名乗ること(黙って勝手な社保で答えない)
    showsGaisan: /社会保険料 ¥762,988 は概算です/.test(body),
    jikoFutan: num(/実質の自己負担¥([\d,]+)/),
    showsOver: /この寄附額は限度額を ¥17,717 超えています/.test(body),
    // ★所得割が非課税の人には「寄附しても税金は戻らない」と言い切ること
    showsNoBenefit: /住民税の所得割がかからないため、ふるさと納税をしても税金は戻りません/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ★看板の答え: 年収500万・独身・社保70万 → 限度額 62,283円
SCENES.furusato = furusatoScene({ shunyu: 5000000, shakai: 700000 });

SCENES.furusato_gaisan = furusatoScene({ shunyu: 5000000, age: 40 });
// 税率表を配信できない → 限度額を出さずに断ること(fail closed)。

// ★★2026-07-14 第23便に見つけた**公開済みページの実バグ**の再発防止シーン。

// ── 住民税 ──────────────────────────────────────────────────────────
// ★期待値は juminzei_core.js を一切通さず、**条文から手で積み上げた実額**を固定する。
//
//   [標準税率・独身・年収500万・社保70万（実額）]
//     給与所得   5,000,000 − 1,440,000(=収入×20%+44万) = 3,560,000  (所法28条・別表第五)
//     課税総所得 3,560,000 − (基礎控除43万 + 社保70万)  = 2,430,000  (地税314条の2/20条の4の2)
//     所得割     市 2,430,000×6% − 調整控除1,500 = 144,300
//                県 2,430,000×4% − 調整控除1,000 =  96,200  → 合計 240,500
//                （調整控除の基礎は5万円。課税総所得が200万超なので下限の5万円に張り付く）
//     均等割     市3,000 + 県1,000 + 森林環境税1,000       =     5,000
//     住民税     240,500 + 5,000                           = **245,500**
//   ★所得割240,500は /furusato/ の検証済みの鎖と同じ値（同じコアの別の顔なので一致するのが正しい）
//
//   [★16歳未満の子1人・1級地・合計所得105万]  ＝ この計算機の看板の主張
//     給与収入 1,700,000 → 給与所得 1,700,000 − 650,000 = 1,050,000 (190万未満は別表第五の定額)
//     均等割の非課税限度額 35万×(本人1+扶養1) + 10万 + **21万** = 1,010,000 → 105万 > 101万 → **課税**
//     所得割の非課税限度額 35万×(本人1+扶養1) + 10万 + **32万** = 1,120,000 → 105万 ≦ 112万 → **非課税**
//     → 住民税は均等割＋森林環境税の **5,000円だけ**（所得割は0円）
//   ★子がいなければ限度額は45万円まで落ちるので所得割も課税され、住民税は 40,500円になる。
//     **扶養控除は1円もつかない**のに（年少扶養控除は平成24年に廃止）、**35,500円変わる**。
//     施行令47条の3第1号が非課税限度額の扶養親族を「年齢十六歳未満の者及び…」と明記しているため。
const juminzeiScene = (inp) => async () => {

  // 自治体・級地・都道府県のプルダウンは参照データの到着後に作られる。

  if (!inp.nodata) {
    await waitFor(() => doc.getElementById("jichitai").options.length > 1, "自治体プルダウン");
    await waitFor(() => doc.getElementById("ken").options.length > 40, "都道府県プルダウン");
    set(doc, "jichitai", inp.jichitai ?? "hyojun");
    set(doc, "kyuchi", String(inp.kyuchi ?? 1));
    set(doc, "ken", "東京都");

  set(doc, "shunyu", String(inp.shunyu));
  set(doc, "age", String(inp.age ?? 40));
  set(doc, "shakai", inp.shakai == null ? "" : String(inp.shakai)); // 空欄 = 年収から概算させる
  set(doc, "fuyoNensho", String(inp.fuyoNensho ?? 0));
  click(doc, "calc");

  await waitFor(
    () => /住民税 ¥|読み込めませんでした|入力してください/.test(text(doc, "result")),

  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    ...inp,
    total: num(/住民税 ¥([\d,]+)/),
    shotokuwari: num(/所得割 ¥([\d,]+)/),
    kintouwari: num(/均等割・森林環境税 ¥([\d,]+)/),
    // ★「均等割だけ課税される帯」に入った人に、画面がそれを名指しで言うこと
    showsKintouOnly: /この方は「均等割だけ」がかかります/.test(body),
    // ★森林環境税を内訳として名乗ること（「復興特別税1,000円」ではない）
    showsShinrin: /森林環境税（国税）¥1,000/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ★看板の答え: 標準税率・独身・年収500万・社保70万 → 住民税 245,500円（所得割240,500＋均等割5,000）

//   所得割も指定都市の8%:2%＋神奈川県の超過課税0.025%が効く
SCENES.juminzei_yokohama = juminzeiScene({ shunyu: 5000000, shakai: 700000, jichitai: "yokohama" });
// 税率表を配信できない → 税額を出さずに断ること(fail closed)

// ── 手取り(額面 − 社保 − 所得税 − 住民税) ─────────────────────────────────────
// このツールは**検証済みの3コアを合成する**だけ。E2Eの肝は「合成とページ配線が正しいか」。
// 期待値はハーネス側で独立に組む:
//   社保 = 協会けんぽ公式額表(fixture)を直に引く / 所得税 = 月額表(lookupIndep)を直に引く。
//   （どちらも上の shahoScene・kyuyoScene と同じ独立オラクル。被検体のコアを一切通さない）
//   住民税は: manual → 入力値そのもの / none → 0 / estimate → juminzei の検証済みの鎖の出力を固定。
// ★入力する額面は**ちょうど標準報酬月額に一致する値**(300,000=第22級)にする。そうすれば
//   fixture を standard で引ける。合成の1段でも狂えば、手取りがこの独立値からズレて落ちる。
const tedoriScene = ({ gross, age = 30, pref = "東京都", dependents = 0,
                       jmode = "none", jmanual = 0, juminAnnual = 0, nodata = false }) => async () => {
  const doc = await open("/docs/tedori/");
  const kenpo = await (await fetch("/tests/fixtures/kyoukaikenpo_tokyo_r08.json?raw=1")).json();
  const table = await (await fetch("/docs/assets/gensen_getsugaku_r08.json?raw=1")).json();

  };
};

//   ＋雇用保険(実額×5/1000)。源泉 = 生の算出率の表(rateIndep)/月額表(lookupIndep)を直に引く。
const bonusTedoriScene = ({ bonus, age = 30, pref = "東京都", dependents = 0,
                            zengetsu = 300000, noPrev = false, nodata = false }) => async () => {
  const doc = await open("/docs/bonus-tedori/");
  const kenpo = await (await fetch("/tests/fixtures/kyoukaikenpo_tokyo_r08.json?raw=1")).json();
  const st = await (await fetch("/docs/assets/gensen_shoyo_r08.json?raw=1")).json();

  // 都道府県プルダウンは社保データ到着後に作られる。配信失敗の再現シーンでは待たない
  if (!nodata) {
    await waitFor(() => doc.querySelector('#pref option[value="東京都"]'), "都道府県の選択肢");
    set(doc, "pref", pref);
  }
  set(doc, "age", String(age));
  set(doc, "bonus", String(bonus));
  set(doc, "dependents", String(dependents));
  if (noPrev) pickRadio(doc, "zmode", "nopaid");
  else set(doc, "zengetsu", String(zengetsu));
  click(doc, "calc"); // ← 参照データの到着を待たずに押す(実ユーザーと同じ)

  await waitFor(
    () => /ボーナスの手取り|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "賞与手取りの計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  // ── ハーネス側の独立オラクル ──
  const roundH = (v) => (v - Math.floor(v)) > 0.5 ? Math.ceil(v) : Math.floor(v);
  const kaigo = age >= 40 && age < 65;
  const stdBonus = Math.floor(bonus / 1000) * 1000;
  const gB = kenpo.grades.find((x) => x.standard === stdBonus);
  const shahoB = gB
    ? Math.round((kaigo ? gB.kenko_kaigo_half : gB.kenko_half) + gB.kosodate_half + gB.kosei_half)
      + roundH(bonus * (KOYOU_WORKER_PERMILLE.general / 1000))   // 雇用保険は賞与の実額にかかる
    : null;
  let zenAfter = 0;
  if (!noPrev) {
    const gZ = kenpo.grades.find((x) => x.standard === zengetsu);
    const shahoZ = Math.round((kaigo ? gZ.kenko_kaigo_half : gZ.kenko_half) + gZ.kosodate_half + gZ.kosei_half)
                 + roundH(zengetsu * (KOYOU_WORKER_PERMILLE.general / 1000));
    zenAfter = zengetsu - shahoZ;                                // 前月の社会保険料等控除後の給与
  }
  const shoyoAfter = shahoB === null ? null : bonus - shahoB;
  let expectedTax = null, viaGetsugaku = false;
  if (shoyoAfter !== null) {
    if (noPrev || shoyoAfter > zenAfter * 10) {
      viaGetsugaku = true;                                       // 備考4 → 月額表による例外計算
      const mt = await (await fetch("/docs/assets/gensen_getsugaku_r08.json?raw=1")).json();
      const per = Math.floor(shoyoAfter / 6);
      const t1 = lookupIndep(mt, per + zenAfter, dependents, "kou");
      const t2 = zenAfter > 0 ? lookupIndep(mt, zenAfter, dependents, "kou") : 0;
      expectedTax = Math.max(0, t1 - t2) * 6;
    } else {
      const rate = rateIndep(st, zenAfter, dependents, "kou");
      expectedTax = Math.floor((shoyoAfter * rate) / 100000);
    }
  }
  const expectedTedori = (shahoB === null || expectedTax === null)
    ? null : bonus - shahoB - expectedTax;

  return {
    bonus, dependents,
    tedori: num(/ボーナスの手取り ¥([\d,]+)/),
    shahoSelf: num(/社会保険料（本人負担）[\s\S]*?− ¥([\d,]+)/),
    shotokuzei: num(/所得税（源泉徴収）[\s\S]*?− ¥([\d,]+)/),
    juminzei: num(/住民税[\s\S]*?− ¥([\d,]+)/),
    declaresNoJuminzei: /賞与からは天引きされません/.test(body),  // 看板の主張が画面に出ているか
    declaresGetsugaku: /月額表による例外計算/.test(body),         // 例外計算を黙って行っていないか
    expectedTedori, expectedShaho: shahoB, expectedTax, viaGetsugaku,
    showsYear: /令和\d+年(度|分)/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ★このツールは shaho_core.calcMonthly の合成。E2Eは「年収→壁判定→社保→手取り」の配線を見る。
//   独立オラクル: 社会保険料 = 協会けんぽ額表の各項目(健保±介護/子育て支援金/厚年)を50銭以下切捨で
//   丸めて合算 ×12（雇用保険は含めない＝壁の前後で増減しないため。記事の手取り定義と同じ）。
//   ★kabe_core を一切通さず、fixture の折半額と端数処理だけから積む（被検体と別実装）。
const round58 = (h) => (h - Math.floor(h) > 0.5 ? Math.ceil(h) : Math.floor(h)); // 50銭超で切上・以下切捨
const kabeSiAnnual = (kenpo, std, age) => {
  const g = kenpo.grades.find((x) => x.standard === std);
  const kaigo = age >= 40 && age < 65;
  const monthly = round58(kaigo ? g.kenko_kaigo_half : g.kenko_half) + round58(g.kosodate_half) + round58(g.kosei_half);
  return monthly * 12;
};

// ★期待値は shussan_core / shobyo_core を一切通さず、協会けんぽの公表額と条文の日数から積む。
//   標準報酬30万 → 300,000÷30=10,000 → ×2/3=6,666.67 → **6,667円**（傷病手当金と同じ99条2項の算式）。
//   ★待期3日は無い（102条2項が準用するのは99条2項・3項だけ）→ 産前42 + 産後56 = **98日**まるごと。
//   6,667 × 98 = **653,366円**（協会けんぽ公表・gbrain hr/shussan-teate-kin）。
const shussanScene = (inp) => async () => {
  const doc = await open("/docs/shussan/");
  set(doc, "yoteibi", inp.yoteibi ?? "2026-06-01");
  set(doc, "shussanbi", inp.shussanbi ?? "");
  set(doc, "monthly", String(inp.monthly ?? 300000));
  set(doc, "months", String(inp.months ?? 12));
  set(doc, "standards", inp.standards ?? "");
  set(doc, "hoshuNichigaku", String(inp.hoshuNichigaku ?? 0));
  set(doc, "heikinOverride", String(inp.heikinOverride ?? 0));
  if (inp.tatai) check(doc, "tatai", true);
  if (inp.ninnikeizoku) check(doc, "ninnikeizoku", true);
  if (inp.taishokugo) check(doc, "taishokugo", true);
  click(doc, "calc"); // ← 参照データの到着を待たずに押す（実ユーザーと同じ）

  await waitFor(
    () => /出産手当金 ¥|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "出産手当金の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    ...inp,
    nichigaku: num(/1日あたりの金額（日額）¥([\d,]+)/),
    days: num(/支給される日数(\d+)日/),
    total: num(/出産手当金 ¥([\d,]+)/),
    // ★出産が予定日より遅れた日数がそのまま給付に乗ることを、画面が名指しで言う（102条1項かっこ書き）
    showsDelay: /出産が予定日より 10日 遅れたため、産前が 10日 延びています/.test(body),
    // ★任意継続なのに**支給される**＝104条の継続給付（shobyo と同じ「黙って¥0」の罠）。名乗ること
    showsKeizoku: /これは「資格喪失後の継続給付」（健康保険法104条）として計算しています。/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ── 育児休業給付金 ────────────────────────────────────────────────────────
// ★期待値は ikuji_core.js を一切通さず、**厚労省の公表する支給限度額**と条文の率から積み上げる。
//
// ★★【第3便で作り直した】支給単位期間は **暦の応当日**で区切る（61条の7第5項）。
//    ここを「30日ずつ」で数えていたため、**本番で1年あたり25,100円 過大に答えていた**。
//    正体は「2つの日数が別の数え方で動く」こと:
//      支給日数（いくら払うか）… 終了月**以外**は**一律30日**（6項1号）。暦31日の月でも30日、暦28日の2月でも30日
//      休業日数（67%→50%の境目）… **暦の通算**。180日目 = 開始日+179日
//    → 暦31日の月では支給日数が1日ぶん遅れる。**「180日目」が来ても67%はまだ177日しか払われていない**。
//
//   [月給30万・賞与なし・**2026-04-01**開始・365日]  賃金日額 = 300,000×6 ÷ 180 = **10,000円**
//     1〜5回目（4/1〜8/31）… 各30日 × 67% = 201,000円/月 → 1,005,000円
//     ★6回目（9/1〜9/30）… 180日目は**9/27**。27日×67%(180,900) + 3日×50%(15,000) = **195,900円**（日割り）
//     7〜11回目（10/1〜2/28）… 各30日 × 50% = 150,000円/月 → 750,000円（★2月も暦28日だが30日分）
//     12回目（3/1〜3/31・終了月）… 実日数31日 × 50% = **155,000円**（2号。ここだけ30日で切らない）
//     合計 = **2,105,900円**（67%は177日 / 50%は184日 / 支給日数の合計361日）
//   ⚠️「30日ずつ」モデルなら 2,131,000円。**この差25,100円がまさに直したバグ**。
//
//   [★★13%（出生後休業支援給付金）が画面に届いているか]
//     10,000 × 28 × 0.13 = **36,400円**
//     ★★これは **ページが shien を渡し忘れると黙って消える**行だった（コアの引数が省略可能だったため）。
//        第23便(/furusato/ の fuyoNensho)・第25便(/shobyo/ の startDate)と**同じ型の事故が3便連続**。
//        → コア側は shien を**必須引数**にして省略を殺した（渡し忘れれば例外になる）。
//        → ページ側は13%の行を**常に描く**（乗るなら金額、乗らないなら理由）。
//        **無い行は、レビューでも本番でも見えない**ので、「行が消える」余地そのものを消してある。
//        このシーンは、その錠前が実際に効いていることを**画面の実額**で固定する。
const ikujiScene = (inp) => async () => {
  const doc = await open("/docs/ikuji/");
  set(doc, "monthly", String(inp.monthly ?? 300000));
  // ★開始日は**過去の固定日**にする（「今日」に依存させない＝実行日で落ちたり通ったりしない）
  set(doc, "startDate", inp.startDate ?? "2026-04-01");
  set(doc, "leaveDays", String(inp.leaveDays ?? 365));
  set(doc, "shienOwnDays", String(inp.shienOwnDays ?? 28));
  set(doc, "shienSpouseDays", String(inp.shienSpouseDays ?? 0));
  if (inp.spouseExempt) check(doc, "spouseExempt", true);
  click(doc, "calc"); // ← 参照データの到着を待たずに押す（実ユーザーと同じ）

  await waitFor(
    () => /育児休業給付 ¥|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "育児休業給付金の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    ...inp,
    // ★th と td の textContent は**空白なしで連結**される（第18便）ので空白を要求しない
    total: num(/育児休業給付 ¥([\d,]+)/),
    ikujiTotal: num(/育児休業給付金（67%／50%）¥([\d,]+)/),
    daily: num(/賃金日額 ¥([\d,]+)/),
    // ★★13%の実額が**画面に出ている**こと（渡し忘れならこの行は0円か、行ごと消える）
    shien: num(/出生後休業支援給付金（＋13%）¥([\d,]+)/),
    // 13%が乗らないときは、**なぜ乗らないか**を画面が名指しで言うこと（黙って0円にしない）
    showsSpouseReason: /配偶者の出生後休業が14日未満/.test(body),
    showsSpouseHint: /配偶者が14日以上の育児休業を取れば、13%（最大28日分）が上乗せされます/.test(body),
    // ★上限は年齢で変わらない（61条の7第6項＝17条4項2号ハ）
    showsCap: /賃金日額が上限（¥16,110）に張りついています/.test(body),
    // ★★支給単位期間が**実際の日付**で出ていること（＝ページが startDate をコアに渡している証拠）。
    //   渡し忘れればコアが例外を投げるので、そもそもここまで来ない（構造的な錠前）。
    unit1: num(/1回目2026-04-01〜2026-04-30¥([\d,]+)/),
    unit7: num(/7回目2026-10-01〜2026-10-31¥([\d,]+)/),
    // ★★180日目（9/27）をまたぐ回の**日割り**が、実額で画面に出ていること。
    //   前便までこの分岐は**利用者の入力から到達不能**だった（30日区切りでは180=6×30で必ず境界に乗るため）。
    //   暦の応当日で区切って、はじめて**本当に検査される**。
    straddleAmount: num(/6回目2026-09-01〜2026-09-30¥([\d,]+)/),
    showsHiwari: /支給日数30日・67%と50%の日割り（27日＋3日）/.test(body),
    // ★暦28日の2月でも**支給日数は30日**（6項1号）。暦との食い違いを画面が自分から開示すること
    //   ⚠️金額と支給日数の間は全角空白（U+3000）だが、text() の \s+ 正規化で**半角空白1個に潰れる**
    //     （JSの \s は U+3000 にも当たる）。ここを全角空白で書くと**永久に false** になる。
    showsFebPayDays: /11回目2027-02-01〜2027-02-28¥150,000\s*支給日数30日（暦は28日）・50%/.test(body),
    // ★終了月だけは実日数（6項2号）。31日を30日に切らない
    showsFinalPayDays: /12回目2027-03-01〜2027-03-31¥155,000\s*支給日数31日・50%/.test(body),
    // ★★67%で払われる日数が**180日ではなく177日**であることを、画面が自分から言うこと
    showsPayDays67: /67%で払われる日数は 177日/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// 産後パパ育休（/papa-ikukyu/）— 61条の8 ＋ 61条の10
//
// ★★期待値は **厚労省「育児休業等給付の内容と支給申請手続」(001461102.pdf) 5頁の計算例**。
//    実装を一切通さず、資料に印刷された金額をそのまま焼き付ける（外部オラクル）。
//      賃金日額10,000円・14日 → 67%: **93,800円** / 13%: **18,200円**
//      同・3日就労で賃金30,000円 → 67%: 112,000−30,000 = **82,000円** / 13%: **18,200円**（減額なし）
//
// ★★このページの主役は **配偶者要件の免除（61条の10第2項3号）**。
//    父親は妻が産後休業中なので、**妻が育休を1日も取らなくても13%が乗る**。
//    ページの既定の選択（「配偶者が出産した」）が、コアに exempt:true を**本当に渡しているか**を
//    画面の実額（18,200円）で固定する。渡し忘れれば「配偶者の育児休業が14日未満」で0円になり落ちる。
// ═══════════════════════════════════════════════════════════════════════════
const papaScene = (inp) => async () => {
  const doc = await open("/docs/papa-ikukyu/");
  set(doc, "monthly", String(inp.monthly ?? 300000)); // 賃金日額 10,000円
  set(doc, "leaveDays", String(inp.leaveDays ?? 14));
  set(doc, "wage", String(inp.wage ?? 0));
  if (inp.spouse) set(doc, "spouse", inp.spouse);
  if (inp.spouseDays !== undefined) set(doc, "spouseDays", String(inp.spouseDays));
  click(doc, "calc"); // ← 参照データの到着を待たずに押す（実ユーザーと同じ）

  await waitFor(
    () => /産後パパ育休の給付 ¥|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "産後パパ育休の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };

  return {
    ...inp,
    total: num(/産後パパ育休の給付 ¥([\d,]+)/),
    shusshoji: num(/出生時育児休業給付金（67%）¥([\d,]+)/),
    // ★13%の行は**常に描かれる**（乗るなら金額・乗らないなら理由）。渡し忘れで行が消える余地を残さない
    shien: num(/出生後休業支援給付金（＋13%）¥([\d,]+)/),
    daily: num(/賃金日額 ¥([\d,]+)/),
    // ★★産後パパ育休の日数が、そのあとの育休の180日枠を食うことを画面が自分から言うこと
    remaining67: num(/67%が続くのは残り(\d+)日/),
    // 13%が乗らないときは**なぜ乗らないか**を名指しで言う（黙って0円にしない）
    showsOwnDaysReason: /あなたの休業が14日未満/.test(body),
    showsCliffHint: /13%（約¥18,200）がまるごと乗ります/.test(body),
    showsSpouseReason: /配偶者の育児休業が14日未満/.test(body),
    // ★賃金で67%が減っても13%は減らないことを画面が明示する
    showsWageReduced: /出生後休業支援給付金（13%）は減額されません/.test(body),
    // ★★80%以上working → 67%不支給。**13%も道連れで消える**（条文に無い規則・厚労省5頁）
    showsUnpaidBoth: /出生後休業支援給付金（13%）も\s*支給されません/.test(body),
    showsCap: /賃金日額が上限（¥16,110）に張りついています/.test(body),
    showsDaysCap: /支給の対象は28日までです/.test(body),
    failed: body.includes("読み込めませんでした"),
    body,
  };
};

// ★看板の答え（厚労省5頁の計算例①）: 月給30万・14日・賃金なし・妻が産後休業中
//   → 67%: 93,800円 / 13%: 18,200円 / 合計 112,000円（＝80%）
//   ★★13%が乗るのは、ページが「配偶者が出産した＝産後休業中」を exempt として渡しているから。
//     渡し忘れれば「配偶者の育児休業が14日未満」で0円になり、このシーンが落ちる。
SCENES.papa = papaScene({});
// ★★厚労省5頁の計算例②: 3日就労して賃金30,000円 → 67%は82,000円に減るが、**13%は18,200円のまま**
SCENES.papa_wage = papaScene({ wage: 30000 });
// ★★賃金が80%相当額（112,000円）以上 → 67%は不支給。**13%も支給されない**（厚労省5頁）。
//   条文（61条の10）には賃金調整の規定が無いので、条文だけ読むと13%は出ると読める。**それは誤り**。
SCENES.papa_unpaid = papaScene({ wage: 112000 });
// ★14日の崖: 13日では13%が1円も出ない（61条の10第1項2号）。あと1日で18,200円乗ることを画面が言う
SCENES.papa_13days = papaScene({ leaveDays: 13 });
// ★免除に当てはまらない人（子が養子など）は、配偶者が14日以上取らないと13%は0円
SCENES.papa_no_exempt = papaScene({ spouse: "employed", spouseDays: 0 });
// ★28日で頭打ち（61条の8第2項2号）＋上限に張りつく人 → 67%: 302,223円 / 13%: 58,640円（厚労省の公表値）
SCENES.papa_cap = papaScene({ monthly: 600000, leaveDays: 40 });
// 参照データを配信できないときは、金額を出さずに断る（fail closed）
SCENES.papa_nodata = papaScene({ nodata: true });

// ── 住宅ローン控除（/jutaku/） 措置法41条・国税庁 No.1211-1 ────────────────
// ★期待値は jutaku_core.js を一切通さず、国税庁 No.1211-1 が公表する控除限度額と条文の率から積む。
//   借入限度額 × 0.7%（100円未満切捨）。認定・令和6年（一般）は借入4,500万 → **31.5万円/年**。
//   ★このツールの主役の事実: 「その他の住宅」を令和6・7年に入居した人は**原則0円**（借入限度額0円）。
//   ページが year/kubun/経過措置/特例のフラグをコアに渡し忘れると、この0円や上乗せが黙って崩れる。
const jutakuScene = (inp) => async () => {
  const doc = await open("/docs/jutaku/");
  set(doc, "type", inp.type ?? "shinchiku");
  set(doc, "kubun", inp.kubun ?? "shoene");
  set(doc, "year", String(inp.year ?? 2025));
  set(doc, "zandaka", String(inp.zandaka ?? 30000000));
  set(doc, "taika", inp.taika != null ? String(inp.taika) : "");
  set(doc, "shotoku", inp.shotoku != null ? String(inp.shotoku) : "");
  set(doc, "menseki", inp.menseki != null ? String(inp.menseki) : "");
  set(doc, "shotokuzei", inp.shotokuzei != null ? String(inp.shotokuzei) : "");
  set(doc, "kazei", inp.kazei != null ? String(inp.kazei) : "");
  if (inp.tokurei) check(doc, "tokurei", true);
  if (inp.keika) check(doc, "keika", true);
  click(doc, "calc"); // ← 参照データの到着を待たずに押す（実ユーザーと同じ）

  await waitFor(
    () => /控除額|計算できません|読み込めませんでした|入力してください/.test(text(doc, "result")),
    "住宅ローン控除の計算結果",
  );
  const body = text(doc, "result");
  const num = (re) => { const m = body.match(re); return m ? Number(m[1].replace(/,/g, "")) : null; };
  return {
    ...inp,
    nenkan: num(/控除額（1年あたり・上限）¥([\d,]+)/),
    soKoujo: num(/総控除額（上限のめやす）¥([\d,]+)/),
    kikan: num(/控除期間(\d+)年/),
    // ★「その他の住宅」令和6・7年 → 原則0円。その理由と経過措置の逃げ道を必ず画面に出す
    zero: /控除の対象になりません/.test(body),
    showsSonotaZero: /「その他の住宅」を.*入居したため、原則として控除の対象になりません/.test(body),
    showsKeikaHint: /「経過措置に該当する」にチェック/.test(body),
    // ★経過措置を適用 → 借入2,000万・10年で復活したことを名乗る
    showsKeikaApplied: /「その他の住宅」の経過措置を適用しました/.test(body),
    // ★子育て世帯等の上乗せを適用したことを名乗る
    showsTokurei: /子育て世帯・若者夫婦世帯（特例対象個人）の上乗せを適用/.test(body),
    // ★中古（既存住宅）として計算したことを名乗る（新築と別レジーム）
    showsChuko: /中古（既存住宅）として計算しています|中古（既存住宅）・/.test(body),
    // ★増改築・想定外の取得のしかたは黙って答えない（fail closed）＝「この計算機では計算できません」
    showsCannotCompute: /この計算機では計算できません/.test(body),
    // ★総控除額は「上限のめやす」であって満額戻る額ではないことを画面が言う
    showsGaisan: /上限のめやす/.test(body),
    // ★所得税額を入れたときだけ出る「実際に戻る税額」の内訳（総務省の一次情報どおり）
    showsRefund: /実際に戻る税額（合計）/.test(body),
    jitsuGenzei: num(/実際に戻る税額（合計）¥([\d,]+)/),
    refundShotokuzei: num(/所得税から引かれる額¥([\d,]+)/),
    refundJuminzei: num(/住民税から引かれる額¥([\d,]+)/),
    kirisute: num(/控除枠のうち戻らない額（切り捨て）¥([\d,]+)/),
    // ★課税総所得未入力 → 上限97,500円で概算した旨を必ず名乗る（黙って多めに言わない）
    showsCapUnknown: /「課税総所得金額等」が未入力のため/.test(body),
    // ★所得税額を入れていないときは、入れれば実額が分かる案内を出す
    showsRefundPrompt: /実際に戻る（軽減される）税額を知りたいときは/.test(body),
    failed: /読み込めませんでした/.test(body),
    body,
  };
};

// ★看板の答え: 認定住宅・令和6年（一般）・年末残高4,500万 → 借入限度額4,500万×0.7% = 31.5万円/年、13年
SCENES.jutaku = jutakuScene({ kubun: "nintei", year: 2024, zandaka: 45000000 });
// ★★このツールの主役の事実: 「その他の住宅」令和6年入居は原則0円（借入限度額0円）。
//   ローンを組んだのに0円という事実と、経過措置という逃げ道を、必ず画面に出すこと。
SCENES.jutaku_sonota_r6 = jutakuScene({ kubun: "sonota", year: 2024, zandaka: 30000000 });
// ★経過措置に該当 → 借入2,000万・控除期間10年・14万円/年で復活。フラグの渡し忘れを捕まえる
SCENES.jutaku_keika = jutakuScene({ kubun: "sonota", year: 2024, zandaka: 30000000, keika: true });
// ★★子育て世帯・若者夫婦世帯の上乗せ（令和6年入居のみ）。認定4,500万→5,000万 → 35万円/年
SCENES.jutaku_tokurei = jutakuScene({ kubun: "nintei", year: 2024, zandaka: 60000000, tokurei: true });
// ★中古（既存住宅・No.1211-3）は新築と別レジーム。認定住宅等の借入限度額3,000万・控除期間10年。
//   認定・令和6年・年末残高4,500万 → min(4,500万, 3,000万)=3,000万 × 0.7% = 21万円/年、10年（新築なら31.5万/13年）。
//   ページが type を渡し忘れて新築で計算すると21万→31.5万・10年→13年に化けてここで落ちる。
SCENES.jutaku_chuko = jutakuScene({ type: "chuko", kubun: "nintei", year: 2024, zandaka: 45000000 });
// ★★中古の主役の事実: 「その他の住宅」でも令和6・7年入居で0円にならない（新築との決定的な違い）。
//   中古・その他・令和6年・年末残高3,000万 → 借入限度2,000万 × 0.7% = 14万円/年、10年（新築なら0円）。
SCENES.jutaku_chuko_sonota = jutakuScene({ type: "chuko", kubun: "sonota", year: 2024, zandaka: 30000000 });
// ★増改築（No.1211-4）は計算方法がまるごと違う → 黙って答えず「この計算機では計算できません」と言うこと
SCENES.jutaku_zokaichiku = jutakuScene({ type: "zokaichiku", kubun: "shoene", year: 2024, zandaka: 45000000 });
// 参照データを配信できないとき → 控除額を出さずに断る（fail closed）。戻らない額を「戻る」と信じさせない
SCENES.jutaku_nodata = jutakuScene({ kubun: "nintei", year: 2024, zandaka: 45000000 });
// ★実際に戻る税額（総務省の一次情報）。期待値は core を通さず条文の率から積む。
//   控除枠315,000（認定・令和6年・残高4,500万 × 0.7%）。所得税額25万・課税総所得600万を入れると:
//     所得税から min(315,000,250,000)=250,000 / 住民税から min(65,000, min(600万×5%=30万,97,500))=65,000
//     → 切り捨て0・実還付 250,000+65,000 = **315,000**（控除枠を満額使えた）。
SCENES.jutaku_refund = jutakuScene({ kubun: "nintei", year: 2024, zandaka: 45000000, shotokuzei: 250000, kazei: 6000000 });
// ★★「残高が大きい人ほど満額戻らない」＋住民税の5％上限が効くケース。控除枠315,000だが所得税額が7.5万円。
//   所得税から75,000 / 住民税から min(240,000, min(150万×5%=**75,000**,97,500))=**75,000**（5％側が上限）
//   → 実還付 75,000+75,000 = **150,000**・切り捨て **165,000**。
//   ★課税総所得を渡し忘れると上限が97,500に化け、住民税75,000→97,500・実還付が172,500に過大化してここで落ちる。
SCENES.jutaku_refund_capped = jutakuScene({ kubun: "nintei", year: 2024, zandaka: 45000000, shotokuzei: 75000, kazei: 1500000 });
// ★課税総所得を入れない → 5％判定ができないので上限97,500で概算し、その旨を必ず名乗る（黙って多めに言わない）。
//   同じ所得税額7.5万でも、住民税から min(240,000,97,500)=97,500 → 実還付 172,500・切り捨て142,500。
//   ＝課税総所得を入れた jutaku_refund_capped（150,000）より多めに出る＝概算だと明示する義務がある。
SCENES.jutaku_refund_nocap = jutakuScene({ kubun: "nintei", year: 2024, zandaka: 45000000, shotokuzei: 75000 });

let state;
try {
  state = { scene, ...(await SCENES[scene]()), page: openedPage };
} catch (e) {
  state = { scene, error: String(e && e.message || e), page: openedPage };
}
window.__state = state; // 手で開いたとき devtools から見る用
await fetch("/__state", { method: "POST", body: JSON.stringify(state) }).catch(() => {});
window.__done = true;
</script>
