<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>扶養控除シミュレーター（ウィジェット）｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/fuyo-kojo/ と重複させない）。計算は本体と同じ ../../assets/setsuzei_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/fuyo-kojo/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="扶養親族の区分・人数と課税所得から扶養控除の年間の節税額を計算する埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .krow{ display:flex; align-items:center; gap:8px; margin:6px 0; }
  .krow label{ flex:1; margin:0; }
  .krow select{ width:5.5em; flex:none; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; margin-top:8px; }
  td{ padding:4px 6px; } td.n{ text-align:right; white-space:nowrap; }
  .tot{ border-top:2px solid var(--accent); font-weight:800; }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .a-share{ border:1px solid var(--line); color:var(--ink); }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>扶養控除シミュレーター</h1>
  <p class="lead">扶養親族の区分・人数と課税所得から、扶養控除で減る所得税・住民税（年間の節税額）を概算します。</p>

  <label>扶養親族の区分と人数<span class="hint">　その年12月31日時点の年齢</span></label>
  <div id="kubun-rows"><p class="hint">読み込み中…</p></div>

  <label for="kazei">課税される所得金額（課税所得・円）<span class="hint">　年収ではありません</span></label>
  <input id="kazei" type="number" inputmode="numeric" placeholder="例: 4000000" min="0" step="10000">

  <button id="calc" type="button">節税額を計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/fuyo-kojo/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（控除額は条文値・所得税は速算表）。
  </div>
</div>

<script type="module">
import { taxSavingSplit, fuyoKojoTotal } from "../../assets/setsuzei_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const man = (n) => (n / 10000).toLocaleString("ja-JP") + "万円";
const BASE = "https://keiri-tools.com/fuyo-kojo/?utm_source=embed&utm_medium=widget";
let R08 = null;

// 参照データ(控除額・税率)は非同期で届く。届く前に押されても await で待つ。
// catch が拾ってよいのは「データが手に入らなかったこと」だけ。
const r08Ready = fetch("../../assets/setsuzei_r08.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => { R08 = d; fillKubunRows(d); return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "fuyo-kojo", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 区分の行(ラベル・控除額)は参照データが正本。ページに金額を手書きしない。
function fillKubunRows(d) {
  const wrap = $("kubun-rows"); wrap.innerHTML = "";
  for (const k of d.fuyo.kubun) {
    const row = document.createElement("div");
    row.className = "krow";
    const lab = document.createElement("label");
    lab.htmlFor = "n-" + k.key;
    lab.innerHTML = `${k.label}<span class="hint" style="display:block">所得税${man(k.shotoku)}・住民税${man(k.jumin)}</span>`;
    const sel = document.createElement("select");
    sel.id = "n-" + k.key;
    for (let i = 0; i <= 5; i++) {
      const o = document.createElement("option");
      o.value = String(i); o.textContent = i + "人";
      sel.appendChild(o);
    }
    row.appendChild(lab); row.appendChild(sel);
    wrap.appendChild(row);
  }
  postHeight();
}

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "計算中…"; postHeight();

  const ok = await r08Ready;
  if (!ok || !R08) {
    box.innerHTML = `<div class="warn"><b>控除額・税率データを読み込めませんでした。</b>通信環境を確認して再読み込みしてください。控除額や税率が分からない状態で節税額は答えられません。</div>`;
    postHeight(); return;
  }

  const counts = {};
  for (const k of R08.fuyo.kubun) counts[k.key] = Number($("n-" + k.key)?.value) || 0;
  const t = fuyoKojoTotal(counts, R08);
  if (t.count === 0) {
    box.innerHTML = `<div class="warn">扶養親族の人数を選んでください（16歳未満は扶養控除の対象外です）。</div>`;
    postHeight(); return;
  }

  const kazei = Number($("kazei").value);
  if (!kazei || kazei <= 0) {
    box.innerHTML = `<div class="warn">課税される所得金額（年収ではなく課税所得）を入力してください。</div>`;
    postHeight(); return;
  }

  let r;
  try {
    r = taxSavingSplit({ kazeiShotoku: kazei, shotokuKojo: t.shotoku, juminKojo: t.jumin }, R08);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>計算できませんでした。</b>入力を確認してください。（${e.message}）</div>`;
    postHeight(); return;
  }

  const shareText = `扶養控除で年${Math.round(r.total).toLocaleString("ja-JP")}円の節税になりました🧮`;
  const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent("https://keiri-tools.com/fuyo-kojo/?utm_source=embed_share")}`;

  let html = `
    <div>年間の節税額 <span class="big">${yen(r.total)}</span> <span class="hint">（扶養親族 ${t.count}人）</span></div>
    <table>
      <tr><td>控除額（所得税 ／ 住民税）</td><td class="n">${yen(t.shotoku)} ／ ${yen(t.jumin)}</td></tr>
      <tr><td>所得税の減少</td><td class="n">${yen(r.shotokuGen)}</td></tr>
      <tr><td>復興特別所得税の減少</td><td class="n">${yen(r.fukkoGen)}</td></tr>
      <tr><td>住民税の減少（10%概算）</td><td class="n">${yen(r.juminGen)}</td></tr>
      <tr class="tot"><td>年間の節税額</td><td class="n">${yen(r.total)}</td></tr>
    </table>`;
  if (r.usedShotoku < t.shotoku) {
    html += `<div class="note">課税所得（${yen(kazei)}）が控除額より小さいため、控除の一部しか効いていません。</div>`;
  }
  html += `<div class="note">※ 扶養親族の要件（所得${R08.fuyo.income_limit != null ? man(R08.fuyo.income_limit) : ""}以下・生計一など）を満たす前提。16歳未満は対象外。所得税は速算表・住民税は所得割10%で概算。${r.year ? `<span class="hint">（${r.year}の速算表）</span>` : ""}</div>
    <div class="cta">
      <a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 要件・区分の見分け方など詳しく見る</a>
      <a class="a-share" href="${shareUrl}" target="_blank" rel="noopener">結果をシェア</a>
    </div>`;

  box.innerHTML = html;
  postHeight();
});
</script>
</body>
</html>
