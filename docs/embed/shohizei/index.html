<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>消費税 計算ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/shohizei/ と重複させない）。計算は本体と同じ ../../assets/shohizei_core.js。
     参照JSONを使わないツールなので fetch/await は不要（本体で確認）。 -->
<link rel="canonical" href="https://keiri-tools.com/shohizei/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="税込・税抜を8%/10%で相互計算し、切捨て・切上げ・四捨五入の端数処理を選べる埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .radios{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .radios label{ display:flex; align-items:center; gap:4px; margin:0; font-size:13px; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:6px 8px; cursor:pointer; }
  .radios label input{ width:auto; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; margin-top:8px; }
  td{ padding:4px 6px; } td.n{ text-align:right; white-space:nowrap; }
  .tot{ border-top:2px solid var(--accent); font-weight:800; }
  .mid{ background:var(--accent2); }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>消費税の計算（税込・税抜）</h1>
  <p class="lead">税抜⇔税込を8%/10%で相互計算し、1円未満の端数処理も選べます。</p>

  <label>入力する金額は</label>
  <div class="radios">
    <label><input type="radio" name="dir" value="excluded" checked>税抜から計算</label>
    <label><input type="radio" name="dir" value="included">税込から計算</label>
  </div>

  <label for="amount">金額（円）</label>
  <input type="number" id="amount" placeholder="例: 10000" inputmode="numeric" min="0">

  <label>税率</label>
  <div class="radios">
    <label><input type="radio" name="rate" value="standard" checked>10%（標準）</label>
    <label><input type="radio" name="rate" value="reduced">8%（軽減）</label>
  </div>

  <label for="mode">1円未満の端数処理</label>
  <select id="mode"></select>
  <div id="mode-note" class="hint" style="margin-top:5px"></div>

  <button id="calc" type="button">計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/shohizei/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（インボイスの端数処理・申告の割戻し/積上げ計算は本体ページに）。
  </div>
</div>

<script type="module">
import { RATES, ROUNDINGS, convert, yen } from "../../assets/shohizei_core.js";

const $ = (id) => document.getElementById(id);
const radio = (name) => document.querySelector(`input[name="${name}"]:checked`).value;
const BASE = "https://keiri-tools.com/shohizei/?utm_source=embed&utm_medium=widget";

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "shohizei", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 端数処理のセレクトを作る（core の定義から）
const modeSel = $("mode");
for (const r of Object.values(ROUNDINGS)) {
  const o = document.createElement("option");
  o.value = r.key; o.textContent = r.label + "（" + r.note + "）";
  modeSel.appendChild(o);
}
const showModeNote = () => { $("mode-note").textContent = ROUNDINGS[$("mode").value].note; };
$("mode").addEventListener("change", () => { showModeNote(); postHeight(); });
showModeNote();

$("calc").addEventListener("click", () => {
  const box = $("result");
  box.style.display = "block";
  const amount = Number($("amount").value);
  if (!(amount > 0)) { box.innerHTML = `<div class="warn">金額を入力してください。</div>`; postHeight(); return; }

  const rateKey = radio("rate");
  const mode = $("mode").value;
  const dir = radio("dir");
  const c = convert(amount, rateKey, mode, dir);
  const R = RATES[rateKey];
  const formula = dir === "included"
    ? `${yen(amount)} × ${R.inNum}/${R.inDen} = ${yen(c.tax)}（${ROUNDINGS[mode].label}）`
    : `${yen(amount)} × ${R.percent}% = ${yen(c.tax)}（${ROUNDINGS[mode].label}）`;

  box.innerHTML = `
    <div>消費税額 <span class="big">${yen(c.tax)}</span></div>
    <table>
      <tr><td>税抜（本体価格）</td><td class="n">${yen(c.excluded)}</td></tr>
      <tr class="mid"><td>消費税（${R.percent}%）</td><td class="n"><b>${yen(c.tax)}</b></td></tr>
      <tr class="tot"><td>税込</td><td class="n">${yen(c.included)}</td></tr>
    </table>
    <div class="note"><b>計算式</b>: ${formula}</div>
    <div class="cta">
      <a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ インボイスの端数処理・申告計算も見る</a>
    </div>`;
  postHeight();
});
</script>
</body>
</html>
