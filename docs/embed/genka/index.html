<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>減価償却費 計算ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/genka/ と重複させない）。計算は本体と同じ ../../assets/genka_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/genka/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="取得価額・耐用年数・償却方法から減価償却費（毎年の償却スケジュール）を自動計算する埋め込みウィジェット。定額法・定率法（200%/250%）対応。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .ym{ display:flex; gap:6px; align-items:center; }
  .ym select{ flex:1; }
  .ym span{ font-size:13px; color:var(--sub); }
  .chk{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink); margin:10px 0 0; }
  .chk input{ width:auto; }
  details{ margin-top:8px; } summary{ font-size:12.5px; color:var(--sub); cursor:pointer; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  .scroll{ overflow-x:auto; margin-top:10px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
  th,td{ padding:4px 6px; text-align:left; white-space:nowrap; }
  td.n,th.n{ text-align:right; }
  thead th{ font-size:12px; color:var(--sub); border-bottom:1px solid var(--line); }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>減価償却費の計算（定額法・定率法）</h1>
  <p class="lead">取得価額・耐用年数・償却方法から、毎年の減価償却費（償却スケジュール）を計算します。平成19年4月1日以後に取得した資産が対象です。</p>

  <label for="method">償却方法</label>
  <select id="method">
    <option value="teigaku" selected>定額法（毎年ほぼ同額）</option>
    <option value="teiritsu">定率法（初めの年ほど多い）</option>
  </select>

  <div class="grid">
    <div>
      <label for="cost">取得価額（円）</label>
      <input id="cost" type="number" inputmode="numeric" min="1" step="1" placeholder="例: 300000" value="300000">
    </div>
    <div>
      <label for="life">耐用年数（年）</label>
      <input id="life" type="number" inputmode="numeric" min="2" max="50" step="1" placeholder="例: 4" value="4">
    </div>
  </div>

  <label id="acq-label">取得（事業に使い始めた）年月</label>
  <div class="ym">
    <select id="acqyear"></select><span>年</span>
    <select id="acqmonth">
      <option value="1">1</option><option value="2">2</option><option value="3">3</option>
      <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
      <option value="7">7</option><option value="8">8</option><option value="9">9</option>
      <option value="10">10</option><option value="11">11</option><option value="12">12</option>
    </select><span>月</span>
  </div>

  <details>
    <summary>詳細設定（事業専用割合）</summary>
    <label for="ratio">事業専用割合（％）　自宅兼用などのときだけ変更。ふつうは100</label>
    <input id="ratio" type="number" inputmode="numeric" min="1" max="100" step="1" placeholder="100" value="100">
  </details>

  <button id="calc" type="button">減価償却費を計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/genka/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（国税庁の償却率表・別表第八〜第十）。
  </div>
</div>

<script type="module">
import { calcGenka } from "../../assets/genka_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const BASE = "https://keiri-tools.com/genka/?utm_source=embed&utm_medium=widget";
let DATA = null;

// 参照データは非同期で届く。届く前に押されても await で待つ（test_data_pages の規律）。
// catch が拾ってよいのは「データが手に入らなかったこと」だけ。
const dataReady = fetch("../../assets/genka_rates.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => { DATA = d; return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "genka", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 取得年の選択肢（今年から1990年まで）。飾り。
(function fillYears() {
  const sel = $("acqyear");
  const now = new Date().getFullYear();
  for (let y = now; y >= 1990; y--) {
    const o = document.createElement("option");
    o.value = String(y); o.textContent = String(y);
    if (y === now - 3) o.selected = true;
    sel.appendChild(o);
  }
})();

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "計算中…"; postHeight();

  const ok = await dataReady; // 必要な参照データの到着を必ず待つ
  if (!ok || !DATA) {
    box.innerHTML = `<div class="warn"><b>償却率表を読み込めませんでした。</b>通信環境を確認して再読み込みしてください。償却率表が分からない状態で償却費は答えられません。</div>`;
    postHeight(); return;
  }

  const cost = Number($("cost").value);
  if (!cost || cost < 1) { box.innerHTML = `<div class="warn">取得価額（円）を入力してください。</div>`; postHeight(); return; }
  const method = $("method").value;
  const acqYm = `${$("acqyear").value}-${String($("acqmonth").value).padStart(2, "0")}`;

  let r;
  try {
    r = calcGenka({
      method, cost, life: Number($("life").value), acqYm,
      bizRatio: Number($("ratio").value) || 100,
    }, DATA);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>計算できませんでした。</b>入力を確認してください。（${e.message}）</div>`;
    postHeight(); return;
  }

  const showExpense = r.bizRatio < 100;
  const rateInfo = r.method === "teiritsu"
    ? `償却率 ${r.rate.toFixed(3)}／改定 ${r.kaiteiRate == null ? "—" : r.kaiteiRate.toFixed(3)}／保証率 ${r.hoshoRate == null ? "—" : r.hoshoRate.toFixed(5)}`
    : `償却率 ${r.rate.toFixed(3)}（取得価額 × 償却率）`;

  const head = `<tr><th>年</th><th class="n">期首帳簿価額</th><th class="n">償却費</th>${showExpense ? `<th class="n">必要経費</th>` : ""}<th class="n">期末帳簿価額</th></tr>`;
  const body = r.schedule.map((s) =>
    `<tr><td>${s.year}年目</td><td class="n">${yen(s.openBook)}</td><td class="n"><b>${yen(s.dep)}</b></td>${showExpense ? `<td class="n">${yen(s.expense)}</td>` : ""}<td class="n">${yen(s.closeBook)}</td></tr>`
  ).join("");

  box.innerHTML = `
    <div>初年度（${r.usedMonths < 12 ? `${13 - r.usedMonths}月から・${r.usedMonths}か月分` : "通年"}）の償却費 <span class="big">${yen(r.firstYearDep)}</span></div>
    ${showExpense ? `<div class="hint" style="margin-top:6px">うち必要経費に算入できる額（事業専用割合${r.bizRatio}％）＝ <b>${yen(r.firstYearExpense)}</b></div>` : ""}
    <div class="hint" style="margin-top:6px">${r.methodLabel}・${r.eraLabel}／耐用年数${r.life}年／${rateInfo}</div>
    <div class="hint" style="margin-top:2px">${r.totalYears}年で1円まで償却（償却費の合計 ${yen(r.totalDep)}＝取得価額−1円）</div>
    <div class="scroll">
      <table><thead>${head}</thead><tbody>${body}</tbody></table>
    </div>
    <div class="note">※ 国税庁の償却率表にもとづく目安です。資産の種類・耐用年数の判定・償却方法の届出などにより実際の申告額は異なる場合があります。</div>
    <div class="cta">
      <a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 詳しい内訳・解説を見る</a>
    </div>`;
  postHeight();
});
</script>
</body>
</html>
