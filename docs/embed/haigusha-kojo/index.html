<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>配偶者控除・配偶者特別控除シミュレーター（ウィジェット）｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/haigusha-kojo/ と重複させない）。計算は本体と同じ ../../assets/setsuzei_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/haigusha-kojo/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="あなたの所得区分と配偶者の年収から配偶者控除・配偶者特別控除の控除額と年間の節税額を計算する埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .hrow{ display:flex; gap:8px; }
  .hrow select{ width:11.5em; flex:none; }
  .chk{ display:flex; align-items:center; gap:8px; margin-top:8px; font-size:13px; color:var(--ink); }
  .chk input{ width:auto; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; margin-top:8px; }
  td{ padding:4px 6px; } td.n{ text-align:right; white-space:nowrap; }
  .tot{ border-top:2px solid var(--accent); font-weight:800; }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .a-share{ border:1px solid var(--line); color:var(--ink); }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>配偶者控除・配偶者特別控除シミュレーター</h1>
  <p class="lead">あなたの所得区分と配偶者の年収から、配偶者控除・配偶者特別控除で減る所得税・住民税（年間の節税額）を概算します。</p>

  <label for="honnin">あなた（控除を受ける人）の合計所得金額</label>
  <select id="honnin"><option value="">読み込み中…</option></select>

  <label for="hincome">配偶者の収入</label>
  <div class="hrow">
    <select id="htype">
      <option value="kyuyo" selected>給与収入で入力</option>
      <option value="shotoku">合計所得で入力</option>
    </select>
    <input id="hincome" type="number" inputmode="numeric" placeholder="例: 1100000" min="0" step="10000">
  </div>

  <label class="chk"><input type="checkbox" id="rojin"> 配偶者は70歳以上（12月31日時点）</label>

  <label for="kazei">あなたの課税される所得金額（課税所得・円）<span class="hint">　年収ではありません</span></label>
  <input id="kazei" type="number" inputmode="numeric" placeholder="例: 4000000" min="0" step="10000">

  <button id="calc" type="button">節税額を計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/haigusha-kojo/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（控除額は国税庁の表・条文値、所得税は速算表）。
  </div>
</div>

<script type="module">
import { taxSavingSplit, haigushaKojo, kyuyoToGokeiShotoku } from "../../assets/setsuzei_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const man = (n) => (n / 10000).toLocaleString("ja-JP") + "万円";
const BASE = "https://keiri-tools.com/haigusha-kojo/?utm_source=embed&utm_medium=widget";
let R08 = null;

// 参照データ(控除額の表・税率)は非同期で届く。届く前に押されても await で待つ。
// catch が拾ってよいのは「データが手に入らなかったこと」だけ。
const r08Ready = fetch("../../assets/setsuzei_r08.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => { R08 = d; fillHonnin(d); return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "haigusha-kojo", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 本人の所得区分(ラベル・給与収入めやす)は参照データが正本。ページに金額を手書きしない。
function fillHonnin(d) {
  const sel = $("honnin"); sel.innerHTML = "";
  d.haigu.honnin_tiers.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = String(t.upto);
    o.textContent = `${t.label}（${t.kyuyo_label}）`;
    if (i === 0) o.selected = true;
    sel.appendChild(o);
  });
  const last = d.haigu.honnin_tiers[d.haigu.honnin_tiers.length - 1];
  const over = document.createElement("option");
  over.value = String(last.upto + 1);
  over.textContent = "1,000万円超（対象外）";
  sel.appendChild(over);
  postHeight();
}

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "計算中…"; postHeight();

  const ok = await r08Ready;
  if (!ok || !R08) {
    box.innerHTML = `<div class="warn"><b>控除額・税率データを読み込めませんでした。</b>通信環境を確認して再読み込みしてください。控除額や税率が分からない状態で節税額は答えられません。</div>`;
    postHeight(); return;
  }

  const honnin = Number($("honnin").value);
  if (!honnin) {
    box.innerHTML = `<div class="warn">あなたの合計所得金額の区分を選んでください。</div>`;
    postHeight(); return;
  }

  const hincomeRaw = $("hincome").value;
  if (hincomeRaw === "" || Number(hincomeRaw) < 0) {
    box.innerHTML = `<div class="warn">配偶者の収入を入力してください（収入が無い場合は 0）。</div>`;
    postHeight(); return;
  }
  const hincome = Number(hincomeRaw);

  // 給与収入は所得へ換算。収入219万円超は換算できない(fail closed — 黙って概算しない)。
  let haiguShotoku = hincome;
  let convNote = "";
  if ($("htype").value === "kyuyo") {
    const conv = kyuyoToGokeiShotoku(hincome, R08);
    if (!conv.ok) {
      box.innerHTML = `<div class="warn"><b>給与収入${man(R08.haigu.kyuyo_kojo_min_limit)}超は所得に換算できません。</b>「合計所得で入力」に切り替えて、給与所得控除を引いた後の所得を入れてください。</div>`;
      postHeight(); return;
    }
    haiguShotoku = conv.shotoku;
    convNote = `給与収入${yen(hincome)} → 合計所得${yen(haiguShotoku)}として計算。`;
  }

  let k;
  try {
    k = haigushaKojo({ honninShotoku: honnin, haiguShotoku, rojin: $("rojin").checked }, R08);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>計算できませんでした。</b>入力を確認してください。（${e.message}）</div>`;
    postHeight(); return;
  }

  if (k.type === "none") {
    const msg = k.reason === "honnin_over"
      ? `あなたの合計所得金額が1,000万円を超えるため、<b>配偶者控除・配偶者特別控除は受けられません</b>（節税額0円）。`
      : `配偶者の合計所得金額（${yen(haiguShotoku)}）が${man(R08.haigu.tokubetsu_max)}を超えるため、<b>対象外</b>です（節税額0円）。`;
    box.innerHTML = `<div>${msg}</div><div class="note">${convNote}</div>`;
    postHeight(); return;
  }

  const kazei = Number($("kazei").value);
  if (!kazei || kazei <= 0) {
    box.innerHTML = `<div class="warn">課税される所得金額（年収ではなく課税所得）を入力してください。</div>`;
    postHeight(); return;
  }

  // 課税所得は合計所得から所得控除を引いた後の額なので、区分を超えることはない(矛盾は黙って答えない)。
  if (kazei > honnin) {
    box.innerHTML = `<div class="warn"><b>課税所得（${yen(kazei)}）が選んだ合計所得金額の区分（${k.tierLabel}）を超えています。</b>区分を選び直してください。</div>`;
    postHeight(); return;
  }

  let r;
  try {
    r = taxSavingSplit({ kazeiShotoku: kazei, shotokuKojo: k.shotoku, juminKojo: k.jumin }, R08);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>計算できませんでした。</b>入力を確認してください。（${e.message}）</div>`;
    postHeight(); return;
  }

  const typeLabel = k.type === "haigusha"
    ? `配偶者控除（${k.rojin ? "老人控除対象配偶者" : "一般"}）`
    : `配偶者特別控除（配偶者の所得 ${k.bandLabel}）`;
  const shareText = `${typeLabel}で年${Math.round(r.total).toLocaleString("ja-JP")}円の節税になりました🧮`;
  const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent("https://keiri-tools.com/haigusha-kojo/?utm_source=embed_share")}`;

  let html = `
    <div>年間の節税額 <span class="big">${yen(r.total)}</span></div>
    <div style="font-size:12.5px;margin-top:2px"><b>${typeLabel}</b></div>
    <table>
      <tr><td>控除額（所得税 ／ 住民税）</td><td class="n">${yen(k.shotoku)} ／ ${yen(k.jumin)}</td></tr>
      <tr><td>所得税の減少</td><td class="n">${yen(r.shotokuGen)}</td></tr>
      <tr><td>復興特別所得税の減少</td><td class="n">${yen(r.fukkoGen)}</td></tr>
      <tr><td>住民税の減少（10%概算）</td><td class="n">${yen(r.juminGen)}</td></tr>
      <tr class="tot"><td>年間の節税額</td><td class="n">${yen(r.total)}</td></tr>
    </table>`;
  if (r.usedShotoku < k.shotoku) {
    html += `<div class="note">課税所得（${yen(kazei)}）が控除額より小さいため、控除の一部しか効いていません。</div>`;
  }
  html += `<div class="note">${convNote} ※ 民法上の配偶者・生計一・専従者でない等の要件を満たす前提。所得税は速算表・住民税は所得割10%で概算。${r.year ? `<span class="hint">（${r.year}の速算表）</span>` : ""}</div>
    <div class="cta">
      <a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 控除額の表・要件など詳しく見る</a>
      <a class="a-share" href="${shareUrl}" target="_blank" rel="noopener">結果をシェア</a>
    </div>`;

  box.innerHTML = html;
  postHeight();
});
</script>
</body>
</html>
