<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>支払サイト・支払日計算ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/shiharai-site/ と重複させない）。計算は本体と同じ ../../assets/payday_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/shiharai-site/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="締め日と支払条件から向こう1年の支払日を土日祝対応で一括計算する埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .radios{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .radios label{ display:flex; align-items:center; gap:4px; margin:0; font-size:13px; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:6px 8px; cursor:pointer; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .hint{ font-size:12px; color:var(--sub); }
  .cond{ font-weight:700; margin-bottom:6px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; padding:6px 8px; font-size:12px; color:var(--sub); }
  td{ padding:6px 8px; border-bottom:1px solid var(--line); }
  .note{ font-size:12px; color:var(--sub); margin-top:10px; padding:8px 10px; background:#fff; border:1px solid var(--line); border-radius:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>支払サイト・支払日計算</h1>
  <p class="lead">締め日と支払条件から、向こう12ヶ月の支払予定日を一括計算します。土日祝・年末年始は自動で営業日調整。</p>

  <div class="grid3">
    <div>
      <label for="closing">締め日</label>
      <select id="closing">
        <option value="末" selected>月末</option>
        <option value="5">5日</option><option value="10">10日</option>
        <option value="15">15日</option><option value="20">20日</option><option value="25">25日</option>
      </select>
    </div>
    <div>
      <label for="offset">支払月</label>
      <select id="offset">
        <option value="0">当月</option>
        <option value="1" selected>翌月</option>
        <option value="2">翌々月</option>
        <option value="3">3ヶ月後</option>
      </select>
    </div>
    <div>
      <label for="payday">支払日</label>
      <select id="payday">
        <option value="末" selected>末日</option>
        <option value="5">5日</option><option value="10">10日</option>
        <option value="15">15日</option><option value="20">20日</option><option value="25">25日</option>
      </select>
    </div>
  </div>

  <label>支払日が土日祝のとき</label>
  <div class="radios">
    <label><input type="radio" name="adjust" value="prev" checked>前営業日に前倒し</label>
    <label><input type="radio" name="adjust" value="next">翌営業日に後ろ倒し</label>
    <label><input type="radio" name="adjust" value="none">調整しない</label>
  </div>

  <button id="calc" type="button">向こう12ヶ月の支払日を計算</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a href="https://keiri-tools.com/shiharai-site/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（祝日データは内閣府の公表分）。
  </div>
</div>

<script type="module">
import { schedule, DOW_JA } from "../../assets/payday_core.js";

const $ = (id) => document.getElementById(id);
const BASE = "https://keiri-tools.com/shiharai-site/?utm_source=embed&utm_medium=widget";
let HOLIDAYS = {};

// 祝日データは非同期で届く。届く前に押されても await で待つ（test_data_pages の規律）。
// 読めなかったときは黙って土日判定にせず、下で断り書きを出す。
const holidaysReady = fetch("../../assets/holidays_jp.json")
  .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then((d) => { HOLIDAYS = d; return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "shiharai-site", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

function cond() {
  return {
    closing: $("closing").value === "末" ? "末" : Number($("closing").value),
    offsetMonths: Number($("offset").value),
    payday: $("payday").value === "末" ? "末" : Number($("payday").value),
    adjust: document.querySelector('input[name="adjust"]:checked').value,
  };
}
function condLabel(c) {
  const cl = c.closing === "末" ? "月末" : `${c.closing}日`;
  const of = ["当月", "翌月", "翌々月", "3ヶ月後"][c.offsetMonths];
  const pd = c.payday === "末" ? "末" : `${c.payday}日`;
  return `${cl}締め ${of}${pd}払い`;
}

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "計算中…"; postHeight();
  const holidaysOk = await holidaysReady; // ← 祝日データが届くまで計算しない
  const c = cond();
  const now = new Date(); // 起算の「今月」を決めるだけ。締め→支払日の日付演算は core の schedule 側にある
  const rows = schedule(c, now.getFullYear(), now.getMonth() + 1, 12, HOLIDAYS);

  const body = rows.map((r) => `
    <tr>
      <td>${r.periodFrom.slice(5).replace("-", "/")}〜${r.periodTo.slice(5).replace("-", "/")}</td>
      <td style="font-weight:700">${r.payIso.replaceAll("-", "/")} (${r.payDow})</td>
      <td class="hint">${r.moved ? "営業日調整" : ""}${r.beyondData ? `${r.moved ? " " : ""}<span title="祝日データ未収録">⚠︎ 概算</span>` : ""}</td>
    </tr>`).join("");

  // 祝日を知らないまま答えている行があるなら、必ずそう言う（黙って断言しない）
  const beyond = rows.filter((r) => r.beyondData);
  let note = "";
  if (!holidaysOk)
    note = `<div class="note"><b>祝日データを読み込めませんでした。</b>土日・年末年始のみで判定しています（祝日は反映されていません）。再読み込みしてください。</div>`;
  else if (beyond.length)
    note = `<div class="note"><b>⚠︎ の行は概算です。</b>${beyond[0].payIso.slice(0, 4)}年以降の祝日はまだ公表されていないため、その行は土日・年末年始のみで判定しています（祝日が来れば前倒しになります）。</div>`;

  box.innerHTML = `
    <div class="cond">${condLabel(c)}</div>
    <div style="overflow-x:auto"><table>
      <tr><th>締め期間</th><th>支払予定日</th><th>備考</th></tr>
      ${body}</table></div>
    ${note}
    <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 取引先ごとの保存・.ics出力を見る</a></div>`;
  postHeight();
});
</script>
</body>
</html>
