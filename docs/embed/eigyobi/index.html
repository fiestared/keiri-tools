<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>営業日計算ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/eigyobi/ と重複させない）。計算は本体と同じ ../../assets/eigyobi_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/eigyobi/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="期間の日数・「◯営業日後」・休業日調整を土日祝対応で計算する埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .radios{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .radios label{ display:flex; align-items:center; gap:4px; margin:0; font-size:13px; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:6px 8px; cursor:pointer; }
  .tabs{ display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .tabs button{ flex:1; margin:0; padding:8px 6px; font-size:12.5px; font-weight:700; width:auto;
    background:var(--accent2); color:var(--accent); border:1px solid var(--line); border-radius:8px; cursor:pointer; }
  .tabs button[aria-selected="true"]{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .pane{ display:none; } .pane[data-active]{ display:block; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  .row{ margin-top:2px; }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; padding:8px 10px; background:#fff; border:1px solid var(--line); border-radius:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>日数計算・営業日計算</h1>
  <p class="lead">期間の日数、「◯営業日後」、休業日の調整を、土日・祝日・年末年始に対応して計算します。</p>

  <div class="tabs" role="tablist">
    <button id="tab-diff" role="tab" aria-selected="true">期間の日数</button>
    <button id="tab-add" role="tab" aria-selected="false">◯営業日後</button>
    <button id="tab-adj" role="tab" aria-selected="false">休業日を調整</button>
  </div>

  <div class="pane" id="pane-diff" data-active>
    <div class="grid">
      <div><label for="from">開始日</label><input type="date" id="from"></div>
      <div><label for="to">終了日</label><input type="date" id="to"></div>
    </div>
    <div class="radios">
      <label><input type="radio" name="edge" value="both" checked>両端を含む</label>
      <label><input type="radio" name="edge" value="one">開始日を含まない</label>
    </div>
  </div>

  <div class="pane" id="pane-add">
    <div class="grid">
      <div><label for="base">基準日</label><input type="date" id="base"></div>
      <div><label for="n">営業日数</label><input type="number" id="n" value="3" inputmode="numeric"></div>
    </div>
    <div class="hint" style="margin-top:6px">マイナスを入れると「◯営業日前」を計算します。</div>
  </div>

  <div class="pane" id="pane-adj">
    <label for="target">対象の日付</label>
    <input type="date" id="target">
    <div class="radios">
      <label><input type="radio" name="adjmode" value="prev" checked>前営業日に前倒し</label>
      <label><input type="radio" name="adjmode" value="next">翌営業日に後ろ倒し</label>
    </div>
  </div>

  <label style="margin-top:14px">休業日の設定</label>
  <div class="radios">
    <label><input type="checkbox" id="o-sat" checked>土曜</label>
    <label><input type="checkbox" id="o-sun" checked>日曜</label>
    <label><input type="checkbox" id="o-hol" checked>祝日</label>
    <label><input type="checkbox" id="o-ye">年末年始</label>
  </div>

  <button id="calc" type="button">計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a href="https://keiri-tools.com/eigyobi/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（祝日データは内閣府の公表分）。
  </div>
</div>

<script type="module">
import {
  parseISO, iso, countDays, addBusinessDays, adjust, DOW_JA, dow, holidayName,
} from "../../assets/eigyobi_core.js";
import { coverageMaxYear } from "../../assets/payday_core.js";

const $ = (id) => document.getElementById(id);
const BASE = "https://keiri-tools.com/eigyobi/?utm_source=embed&utm_medium=widget";
let H = {};

// 祝日データは非同期で届く。届く前に押されても await で待つ（test_data_pages の規律）。
// 読めなかったときは黙って土日だけで数えず、下で断り書きを出す。
const holidaysReady = fetch("../../assets/holidays_jp.json")
  .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then((d) => { H = d; return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "eigyobi", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 既定値は「今日」を YYYY-MM-DD に整形するだけ（答えを左右する日付演算はしない・core側にある）
const t = new Date();
const iso0 = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
$("from").value = iso0(t); $("to").value = iso0(t); $("base").value = iso0(t); $("target").value = iso0(t);

const panes = ["diff", "add", "adj"];
let mode = "diff";
for (const p of panes) {
  $("tab-" + p).addEventListener("click", () => {
    mode = p;
    for (const q of panes) {
      $("tab-" + q).setAttribute("aria-selected", String(q === p));
      $("pane-" + q).toggleAttribute("data-active", q === p);
    }
    $("result").style.display = "none";
    postHeight();
  });
}

const opts = () => ({
  sat: $("o-sat").checked, sun: $("o-sun").checked,
  holiday: $("o-hol").checked, yearEnd: $("o-ye").checked,
});
const fmt = (dt) => {
  const hn = holidayName(dt, H);
  return `${iso(dt).replaceAll("-", "/")}（${DOW_JA[dow(dt)]}）${hn ? " " + hn : ""}`;
};

// 祝日データの収録最終年を超える日付は「祝日を知らないまま」判定している。黙って断言せず「概算」と申告する。
const isBeyond = (...dts) => {
  const maxY = coverageMaxYear(H);
  return dts.filter(Boolean).some((dt) => dt.y > maxY);
};
const disclaimer = (holidaysOk, beyond, o) => {
  if (!o.holiday) return ""; // 祝日を休みに数えない設定 = データの有無は結果に影響しない
  const only = `土日${o.yearEnd ? "・年末年始" : ""}のみ`;
  if (!holidaysOk) {
    return `<div class="note"><b>祝日データを読み込めませんでした。</b>
      ${only}で判定しています（祝日は反映されていません）。ページを再読み込みしてください。</div>`;
  }
  if (beyond) {
    return `<div class="note"><b>⚠︎ 概算です。</b>
      ${coverageMaxYear(H) + 1}年以降の祝日はまだ公表されていないため、その範囲は${only}で判定しています
      （祝日が確定すれば営業日はさらに減ります）。</div>`;
  }
  return "";
};

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "計算中…"; postHeight();
  const holidaysOk = await holidaysReady; // ← 祝日データが届くまで計算しない
  const o = opts();

  if (mode === "diff") {
    const from = parseISO($("from").value), to = parseISO($("to").value);
    const both = document.querySelector('input[name="edge"]:checked').value === "both";
    const r = countDays(from, to, H, o, both);
    box.innerHTML = `
      <div class="row">日数 <span class="big">${r.total}日</span></div>
      <div class="row" style="margin-top:6px">うち<b>営業日 ${r.business}日</b> ／ 休業日 ${r.closed}日</div>
      <div class="hint" style="margin-top:8px">${fmt(from)} 〜 ${fmt(to)}（${both ? "両端を含む" : "開始日を含まない"}）</div>
      ${r.holidays.length ? `<div class="note"><b>期間内の祝日 ${r.holidays.length}日</b><br>${r.holidays.map(h => `${h.date.replaceAll("-", "/")} ${h.name}`).join("<br>")}</div>` : ""}
      ${disclaimer(holidaysOk, isBeyond(from, to), o)}`;
  } else if (mode === "add") {
    const base = parseISO($("base").value);
    const n = Number($("n").value);
    const r = addBusinessDays(base, n, H, o);
    box.innerHTML = `
      <div class="row">${n >= 0 ? n + "営業日後" : Math.abs(n) + "営業日前"} <span class="big">${iso(r).replaceAll("-", "/")}</span></div>
      <div class="row" style="margin-top:4px">${fmt(r)}</div>
      <div class="hint" style="margin-top:8px">基準日: ${fmt(base)}（起算日は翌日から・当日は含みません）</div>
      ${disclaimer(holidaysOk, isBeyond(base, r), o)}`;
  } else {
    const target = parseISO($("target").value);
    const m = document.querySelector('input[name="adjmode"]:checked').value;
    const r = adjust(target, m, H, o);
    box.innerHTML = `
      <div class="row">調整後 <span class="big">${iso(r).replaceAll("-", "/")}</span></div>
      <div class="row" style="margin-top:4px">${fmt(r)}</div>
      <div class="hint" style="margin-top:8px">${r.moved ? `${fmt(target)} は休業日のため、${m === "prev" ? "前" : "翌"}営業日にずらしました。` : `${fmt(target)} は営業日のため、そのままです。`}</div>
      ${disclaimer(holidaysOk, isBeyond(target, r), o)}`;
  }
  box.innerHTML += `<div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 詳しい解説・保存機能を見る</a></div>`;
  postHeight();
});
</script>
</body>
</html>
