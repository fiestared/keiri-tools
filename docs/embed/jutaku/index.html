<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>住宅ローン控除 計算ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/jutaku/ と重複させない）。計算は本体と同じ ../../assets/jutaku_core.js。
     借入限度額・控除率・控除期間は ../../assets/jutaku_r07.json（答えの一部）なので、
     本体と同じ fetch→await→fail-closed（読み込めませんでした）を踏襲する。 -->
<link rel="canonical" href="https://keiri-tools.com/jutaku/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="住宅ローン控除（住宅借入金等特別控除）の1年あたりの控除額・控除期間・総額のめやすを自動計算する埋め込みウィジェット。控除率0.7％。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  details{ margin-top:10px; } summary{ font-size:12.5px; color:var(--sub); cursor:pointer; }
  .chk{ display:block; font-size:13px; color:var(--ink); margin:8px 0 2px; }
  .chk input{ width:auto; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:24px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; margin-top:8px; }
  td{ padding:4px 6px; vertical-align:top; } td.n{ text-align:right; white-space:nowrap; font-weight:700; }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .callout{ font-size:12.5px; color:var(--ink); background:var(--accent2); border-radius:8px; padding:9px 11px; margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>住宅ローン控除 計算</h1>
  <p class="lead">1年あたりの控除額・控除期間・総額のめやすを計算します。<b>控除率は0.7％</b>（1％ではありません）。住宅の種類と入居年で借入限度額が大きく変わります。</p>

  <label for="type">取得のしかた</label>
  <select id="type">
    <option value="shinchiku" selected>新築・買取再販</option>
    <option value="chuko">中古（既存住宅）</option>
    <option value="zokaichiku">増改築・リフォーム</option>
  </select>

  <div class="grid">
    <div>
      <label for="kubun">住宅の種類（省エネ性能）</label>
      <select id="kubun">
        <option value="nintei">認定住宅</option>
        <option value="zeh">ZEH水準省エネ住宅</option>
        <option value="shoene" selected>省エネ基準適合住宅</option>
        <option value="sonota">その他の住宅</option>
      </select>
    </div>
    <div>
      <label for="year">入居した年</label>
      <select id="year"></select>
    </div>
  </div>

  <label for="zandaka">年末のローン残高（12月31日時点・円）</label>
  <input id="zandaka" type="number" inputmode="numeric" value="30000000" placeholder="例: 30000000">

  <details>
    <summary>詳細設定（子育て世帯の上乗せ・経過措置）</summary>
    <label class="chk"><input type="checkbox" id="tokurei"> 特例対象個人（子育て世帯・若者夫婦世帯）である（2024・2025年入居で借入限度額が上乗せ）</label>
    <label class="chk"><input type="checkbox" id="keika"> 「その他の住宅」の経過措置に該当する（2023年末までに建築確認、または2024年6月末までに建築）</label>
  </details>

  <button id="calc" type="button">控除額を計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/jutaku/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（国税庁 No.1211-1／1211-3・租税特別措置法41条）。
  </div>
</div>

<script type="module">
import { calc } from "../../assets/jutaku_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const man = (n) => (n % 10000 === 0 ? `${(n / 10000).toLocaleString("ja-JP")}万円` : yen(n));
const BASE = "https://keiri-tools.com/jutaku/?utm_source=embed&utm_medium=widget";
// 西暦→和暦ラベルは**JSで描く**（静的HTMLに「令和N年」を焼き込まない＝年度データを差し替えても嘘にならない）。
const eraLabel = (y) => `令和${y - 2018}年（${y}年）`;

// 入居年の選択肢を同期で組み立てる（西暦をvalue、和暦をラベルに）
const yearSel = $("year");
for (const y of [2022, 2023, 2024, 2025]) {
  const o = document.createElement("option");
  o.value = String(y);
  o.textContent = eraLabel(y);
  if (y === 2025) o.selected = true;
  yearSel.appendChild(o);
}

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "jutaku", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 参照データ（借入限度額・控除率・控除期間）は非同期で届く。**答えの一部**なので、
// 届く前にボタンを押されても await で待つ。catch が拾ってよいのは「データが手に入らなかったこと」だけ。
let D = null;
const dataReady = fetch("../../assets/jutaku_r07.json")
  .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then((d) => { D = d; return true; })
  .catch(() => false);

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "計算中…"; postHeight();

  const ready = await dataReady;
  if (!ready || !D) {
    box.innerHTML = `<div class="warn"><b>参照データを読み込めませんでした。</b>通信環境を確認して再読み込みしてください。借入限度額や控除率が分からないまま控除額を答えると、実際には戻らない金額を「戻る」と信じて資金計画を誤るおそれがあるため、計算を止めています。</div>`;
    postHeight(); return;
  }

  const zandaka = Number($("zandaka").value);
  const type = $("type").value;
  if ((type === "shinchiku" || type === "chuko") && !(zandaka > 0)) {
    box.innerHTML = `<div class="warn">「年末のローン残高」を入力してください。その年の12月31日時点の残高で控除額が決まります。</div>`;
    postHeight(); return;
  }

  let r;
  try {
    r = calc({
      type,
      kubun: $("kubun").value,
      year: Number($("year").value),
      nenmatsuZandaka: zandaka,
      kosodateTokurei: $("tokurei").checked,
      keikaSochi: $("keika").checked,
    }, D);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>計算できませんでした。</b>${e.message}</div>`;
    postHeight(); return;
  }

  // ── 収録範囲外（増改築・範囲外の年） → 黙って答えない（fail closed） ──
  if (r.beyondData) {
    box.innerHTML = `<div class="big">この計算機では計算できません</div><div class="callout"><b>${r.reason}</b></div>
      <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ くわしい住宅ローン控除の計算・解説を見る</a></div>`;
    postHeight(); return;
  }

  const kubunLabel = r.kubunLabel;
  const yearLabel = eraLabel(r.year);

  // ── 対象外（¥0）──
  if (!r.eligible) {
    let why = "";
    if (r.sonotaZero) {
      why = `<div class="callout"><b>★「その他の住宅」を${yearLabel}に入居したため、原則として控除の対象になりません（借入限度額0円）。</b>省エネ基準を満たさない住宅は2024年・2025年の入居で控除がゼロになりました（2023年までは3,000万円）。<b>2023年末までに建築確認を受けた</b>、または<b>2024年6月末までに建築された</b>住宅なら、上の詳細設定で<b>「経過措置に該当する」</b>にチェックすると2,000万円・10年で計算し直します。</div>`;
    } else {
      why = `<div class="callout">入力の条件では控除の対象になりません。</div>`;
    }
    box.innerHTML = `
      <div class="big">控除額 ¥0（原則、控除の対象になりません）</div>
      <div class="hint" style="margin-bottom:6px">${kubunLabel}・${yearLabel}に入居</div>
      ${why}
      <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ くわしい住宅ローン控除の計算・解説を見る</a></div>`;
    postHeight(); return;
  }

  // ── 対象（控除額あり）──
  const chukoNote = r.isChuko
    ? `<div class="callout"><b>★中古（既存住宅）として計算しています。</b>借入限度額は<b>認定住宅等3,000万円／その他2,000万円</b>、控除期間は<b>一律10年</b>。新築と違い「その他の住宅」でも0円になりません。子育て世帯の上乗せ・経過措置は中古にはありません。</div>`
    : "";
  const tokureiNote = r.tokureiApplied
    ? `<div class="callout"><b>★子育て世帯・若者夫婦世帯の上乗せを適用しました。</b>借入限度額が<b>${man(r.shakunyuGendoEn)}</b>になっています。</div>`
    : "";
  const keikaNote = r.keikaApplied
    ? `<div class="callout"><b>★「その他の住宅」の経過措置を適用しました。</b>借入限度額<b>2,000万円</b>・控除期間<b>10年</b>で計算しています。</div>`
    : "";
  const zandakaVal = Number($("zandaka").value);
  const cappedNote = (zandakaVal > r.shakunyuGendoEn)
    ? `<div class="hint">年末残高が借入限度額（${man(r.shakunyuGendoEn)}）を超えているため、控除の対象は借入限度額で頭打ちになっています。</div>`
    : "";

  box.innerHTML = `
    <div class="big">控除額（1年あたり・上限）${yen(r.nenkanKoujo)}</div>
    <div class="hint" style="margin-bottom:6px">${r.isChuko ? "中古（既存住宅）・" : ""}${kubunLabel}・${yearLabel}に入居</div>
    ${chukoNote}${tokureiNote}${keikaNote}${cappedNote}
    <table>
      <tr><td>年間の控除額（上限）</td><td class="n">${yen(r.nenkanKoujo)}</td></tr>
      <tr><td>控除の対象になる借入残高</td><td class="n">${yen(r.koujoTaisho)}</td></tr>
      <tr><td>借入限度額</td><td class="n">${man(r.shakunyuGendoEn)}</td></tr>
      <tr><td>控除率</td><td class="n">${r.koujoRitsuPct}％</td></tr>
      <tr><td>控除期間</td><td class="n">${r.kikan}年</td></tr>
      <tr><td>総控除額（上限のめやす）</td><td class="n">${yen(r.soKoujoGaisan)}</td></tr>
    </table>
    <div class="note"><b>★この金額は「上限のめやす」で、そのまま戻る金額ではありません。</b>各年の控除額は<b>その年の年末残高</b>で決まり、返済が進むほど毎年減ります。総控除額（${yen(r.soKoujoGaisan)}）は「年間控除額 × ${r.kikan}年」の上限概算です。実際に戻る税額はその年の<b>所得税額</b>と翌年度の住民税の上限までなので、残高が大きい人ほど満額は戻りません。</div>
    <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 実際に戻る税額・所得や床面積の条件を見る</a></div>`;
  postHeight();
});
</script>
</body>
</html>
