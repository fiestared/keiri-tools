<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自動車税 判定ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/jidoshazei/ と重複させない）。判定は本体と同じ ../../assets/jidoshazei_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/jidoshazei/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="総排気量と初度登録の年月から自家用乗用車の自動車税（種別割）の年額を判定する埋め込みウィジェット。13年超の重課・月割・軽自動車税に対応。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .ym{ display:flex; gap:6px; align-items:center; }
  .ym select{ flex:1; }
  .ym span{ font-size:13px; color:var(--sub); }
  .chk{ display:flex; align-items:flex-start; gap:6px; font-size:12.5px; color:var(--ink); margin:10px 0 0; }
  .chk input{ width:auto; margin-top:3px; }
  .echo{ font-size:12px; color:var(--sub); margin:4px 0 0; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>自動車税はいくら？ 判定</h1>
  <p class="lead">総排気量と初度登録の年月から、自家用乗用車の自動車税（種別割）の年額を判定します。</p>

  <label for="vehicle">車種</label>
  <select id="vehicle">
    <option value="passenger" selected>自家用乗用車（登録車・白／3・5・7ナンバー）〔自動車税〕</option>
    <option value="kei">軽自動車（自家用乗用・黄色ナンバー）〔軽自動車税〕</option>
  </select>

  <div id="cc-block">
    <label for="cc">総排気量<span class="hint">　車検証の「総排気量」（電気自動車は先頭）</span></label>
    <select id="cc">
      <option value="ev">電気自動車（燃料電池車を含む）</option>
      <option value="le1000">1リットル（1,000cc）以下</option>
      <option value="le1500">1リットル超 1.5リットル以下</option>
      <option value="le2000" selected>1.5リットル超 2リットル以下</option>
      <option value="le2500">2リットル超 2.5リットル以下</option>
      <option value="le3000">2.5リットル超 3リットル以下</option>
      <option value="le3500">3リットル超 3.5リットル以下</option>
      <option value="le4000">3.5リットル超 4リットル以下</option>
      <option value="le4500">4リットル超 4.5リットル以下</option>
      <option value="le6000">4.5リットル超 6リットル以下</option>
      <option value="gt6000">6リットル超</option>
    </select>
  </div>

  <label for="regyear" id="reg-label">初度登録の年月<span class="hint" id="reg-hint">　車検証の「初度登録年月」（軽は「初度検査年月」）</span></label>
  <div class="ym">
    <select id="regyear"></select><span>年</span>
    <select id="regmonth">
      <option value="1">1</option><option value="2">2</option><option value="3">3</option>
      <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
      <option value="7">7</option><option value="8">8</option><option value="9">9</option>
      <option value="10">10</option><option value="11">11</option><option value="12">12</option>
    </select><span>月</span>
  </div>
  <div id="rate-echo" class="echo"></div>

  <label for="fuel">燃料の種類<span class="hint">　13年超の重課の対象かどうかの判定に使います</span></label>
  <select id="fuel">
    <option value="gasoline" selected>ガソリン・LPG</option>
    <option value="diesel">ディーゼル（軽油）</option>
    <option value="hybrid">ハイブリッド（ガソリンを燃料とするもの）</option>
    <option value="ev_other">電気・その他</option>
  </select>

  <label class="chk"><input type="checkbox" id="jyuka"> <b>初度登録から13年を超えている</b>（ディーゼル車は11年超）<span class="hint">　※ハイブリッド・電気・天然ガス車は対象外</span></label>

  <div id="proate-block">
    <label class="chk"><input type="checkbox" id="proate"> この車を<b>新規登録した年度の税額（月割）</b>も表示する<span class="hint">　登録の月から翌年3月までの月割（登録車のみ）</span></label>
  </div>

  <button class="primary" id="calc" type="button">自動車税の年額を判定する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/jidoshazei/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の判定エンジンで動いています（東京都主税局の税率表・令和8年度・標準税率）。
  </div>
</div>

<script type="module">
import { calcJidoshazei } from "../../assets/jidoshazei_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const BASE = "https://keiri-tools.com/jidoshazei/?utm_source=embed&utm_medium=widget";
let DATA = null;

// 参照データは非同期で届く。届く前に押されても await で待つ（test_data_pages の規律）。
// catch が拾ってよいのは「データが手に入らなかったこと」だけ。
const dataReady = fetch("../../assets/jidoshazei_r08.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => { DATA = d; return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "jidoshazei", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// 初度登録の「年」の選択肢を作る（今年から1990年まで）。飾り。
(function fillYears() {
  const sel = $("regyear");
  const now = new Date().getFullYear();
  for (let y = now; y >= 1990; y--) {
    const o = document.createElement("option");
    o.value = String(y); o.textContent = String(y);
    if (y === 2021) o.selected = true;
    sel.appendChild(o);
  }
})();

// 車種に応じて入力欄を出し分ける（軽は排気量・月割を出さない）。飾りの echo は届いたデータで描く。
function refreshForm() {
  const isKei = $("vehicle").value === "kei";
  $("cc-block").style.display = isKei ? "none" : "";
  $("proate-block").style.display = isKei ? "none" : "";
  $("reg-hint").textContent = isKei
    ? "　車検証の「初度検査年月」（新旧の境界は平成27年4月1日）"
    : "　車検証の「初度登録年月」（新旧の境界は令和元年10月1日）";
  refreshEcho();
  postHeight();
}
function refreshEcho() {
  if (!DATA) { $("rate-echo").textContent = ""; return; }
  const v = $("vehicle").value;
  const firstReg = `${$("regyear").value}-${String($("regmonth").value).padStart(2, "0")}`;
  const boundary = v === "kei" ? DATA.kei.boundary : DATA.passenger.boundary;
  const label = v === "kei" ? DATA.kei.boundary_label : DATA.passenger.boundary_label;
  $("rate-echo").innerHTML = firstReg >= boundary
    ? `→ ${label}<b>以後</b>の登録＝<b>新税率</b>で判定します`
    : `→ ${label}<b>より前</b>の登録＝<b>旧税率</b>で判定します`;
}
$("vehicle").addEventListener("change", refreshForm);
$("regyear").addEventListener("change", refreshEcho);
$("regmonth").addEventListener("change", refreshEcho);
dataReady.then(() => { refreshEcho(); postHeight(); }).catch(() => {});
refreshForm();

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "判定中…"; postHeight();

  const ok = await dataReady; // 必要な参照データの到着を必ず待つ
  if (!ok || !DATA) {
    box.innerHTML = `<div class="warn"><b>税額表を読み込めませんでした。</b>通信環境を確認して再読み込みしてください。税額表が分からない状態で税額は答えられません。</div>`;
    postHeight(); return;
  }

  const vehicle = $("vehicle").value;
  const firstReg = `${$("regyear").value}-${String($("regmonth").value).padStart(2, "0")}`;
  let r;
  try {
    r = calcJidoshazei({
      vehicle, cc: $("cc").value, firstReg, fuel: $("fuel").value,
      jyuka: $("jyuka").checked,
      prorateMonth: (vehicle === "passenger" && $("proate").checked) ? Number($("regmonth").value) : null,
    }, DATA);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>判定できませんでした。</b>入力を確認してください。（${e.message}）</div>`;
    postHeight(); return;
  }

  const noteHtml = r.notes.length
    ? `<div class="hint" style="margin-top:10px">${r.notes.map((n) => "※ " + n).join("<br>")}</div>` : "";
  const jyukaTag = r.isJyuka ? "／<b>13年超の重課を適用</b>" : "";
  const yearTag = DATA._meta?.year ? `<span class="hint">（${DATA._meta.year}・標準税率で判定）</span>` : "";

  const proHtml = r.proration
    ? (r.proration.months === 0
        ? `<div style="margin-top:10px">新規登録した年度（3月登録） <span class="big">¥0</span></div>
           <div class="hint" style="margin-top:6px">3月に登録した場合、その年度分はかかりません。翌年度から年額 <b>${yen(r.annual)}</b> です。</div>`
        : `<div style="margin-top:10px"><b>新規登録した年度の月割（${r.proration.month}月登録）</b> <span class="big">${yen(r.proration.amount)}</span></div>
           <div class="hint" style="margin-top:6px">${r.proration.months}か月分（登録の翌月〜翌3月）。<b>翌年度からは年額 ${yen(r.annual)}</b> です。</div>`)
    : "";

  box.innerHTML = `
    <div><b>自動車税${vehicle === "kei" ? "（軽自動車税）" : ""}の年額</b> <span class="big">${yen(r.annual)}</span></div>
    <div class="hint" style="margin-top:6px">${r.vehicleName}／${r.ccLabel}／${r.rateTypeLabel}${jyukaTag}</div>
    ${proHtml}
    ${noteHtml}
    <div class="note">※ ${r.taxKind}。標準税率にもとづく目安で、実際の税額は納税通知書が正本です。${yearTag}</div>
    <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 税額一覧表・詳しい解説を見る</a></div>`;
  postHeight();
});
</script>
</body>
</html>
