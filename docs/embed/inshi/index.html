<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>収入印紙の金額 判定ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/inshi/ と重複させない）。判定は本体と同じ ../../assets/inshi_core.js。 -->
<link rel="canonical" href="https://keiri-tools.com/inshi/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="文書の種類と記載金額から、必要な収入印紙の額を印紙税額一覧表（第1号〜第20号）で判定する埋め込みウィジェット。消費税の区分記載・軽減税率に対応。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .chk{ display:flex; align-items:flex-start; gap:6px; font-size:12.5px; color:var(--ink); margin:8px 0 0; }
  .chk input{ width:auto; margin-top:3px; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>収入印紙の金額 判定</h1>
  <p class="lead">文書の種類と記載金額から、その文書1通に必要な収入印紙の額を判定します（印紙税額一覧表・全20号）。</p>

  <label for="doc">文書の種類</label>
  <select id="doc">
    <optgroup label="領収書・受取書（17号・16号）">
      <option value="k17_uriage" selected>領収書・レシート（商品・サービスなど売上代金の受取書）〔17号〕</option>
      <option value="k17_other">借入金・保険金・損害賠償金・補償金・返還金などの受取書（売上代金以外）〔17号〕</option>
      <option value="k16">配当金領収証・配当金振込通知書〔16号〕</option>
    </optgroup>
    <optgroup label="契約書（1号・2号・5〜7号・12〜15号）">
      <option value="k1_fudosan">不動産売買契約書・不動産交換契約書・不動産売渡証書（不動産の譲渡）〔1号・軽減あり〕</option>
      <option value="k1_other">土地賃貸借契約書・金銭借用証書（消費貸借）・運送に関する契約書〔1号〕</option>
      <option value="k2_kensetsu">工事請負契約書・工事注文請書（建設工事の請負）〔2号・軽減あり〕</option>
      <option value="k2_other">建設工事以外の請負契約書（物品加工・修理・広告・システム開発など）〔2号〕</option>
      <option value="k5">合併契約書・吸収分割契約書・新設分割計画書〔5号〕</option>
      <option value="k6">定款（会社設立時の原本）〔6号〕</option>
      <option value="k7">継続的取引の基本となる契約書（取引基本契約書・特約店契約書・代理店契約書・業務委託契約書・銀行取引約定書など）〔7号〕</option>
      <option value="k12">信託行為に関する契約書（信託証書）〔12号〕</option>
      <option value="k13">債務の保証に関する契約書〔13号〕</option>
      <option value="k14">金銭・有価証券の寄託に関する契約書〔14号〕</option>
      <option value="k15">債権譲渡・債務引受けに関する契約書〔15号〕</option>
    </optgroup>
    <optgroup label="手形・証券・証書（3号・4号・8〜11号）">
      <option value="k3">約束手形・為替手形〔3号〕</option>
      <option value="k4">株券・出資証券・社債券・投資信託などの受益証券〔4号〕</option>
      <option value="k8">預金証書・貯金証書〔8号〕</option>
      <option value="k9">倉荷証券・船荷証券・複合運送証券〔9号〕</option>
      <option value="k10">保険証券〔10号〕</option>
      <option value="k11">信用状〔11号〕</option>
    </optgroup>
    <optgroup label="通帳・判取帳（18〜20号）">
      <option value="k18">預金通帳・貯金通帳・信託通帳・掛金通帳・保険料通帳〔18号〕</option>
      <option value="k19">その他の通帳（消費貸借通帳・請負通帳・金銭の受取通帳など）〔19号〕</option>
      <option value="k20">判取帳〔20号〕</option>
    </optgroup>
  </select>

  <div id="amount-block">
    <label for="amount">記載金額（円）<span class="hint" id="amount-unit">　文書に記載された受取金額</span></label>
    <input type="number" id="amount" min="0" inputmode="numeric" placeholder="例: 54800">
    <label class="chk"><input type="checkbox" id="noamount"> 金額の記載がない文書</label>
  </div>

  <div id="tax-block">
    <label for="taxpart">うち消費税額等（円）<span class="hint">　「うち消費税額等◯円」などの区分記載がある場合だけ</span></label>
    <input type="number" id="taxpart" value="0" min="0" inputmode="numeric" placeholder="例: 4981">
    <label class="chk"><input type="checkbox" id="menzei"> 作成者は消費税の<b>免税事業者</b>（区分記載しても税込で判定）</label>
  </div>

  <div id="k17-block">
    <label class="chk"><input type="checkbox" id="hieigyo"> <b>営業に関しない</b>受取書（商人でない個人が事業と関係なく作成。例: 個人がマイホーム・マイカーを売った代金の領収書）</label>
  </div>

  <div id="k3-block" style="display:none">
    <label class="chk"><input type="checkbox" id="ichiranbarai"> 一覧払・金融機関相互間・外国通貨表示・非居住者円表示・円建銀行引受手形</label>
  </div>

  <button class="primary" id="calc" type="button">収入印紙の金額を判定する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/inshi/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の判定エンジンで動いています（国税庁 No.7140/7141・軽減 No.7108・消費税 No.6925）。
  </div>
</div>

<script type="module">
import { calcInshi } from "../../assets/inshi_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const BASE = "https://keiri-tools.com/inshi/?utm_source=embed&utm_medium=widget";
let INSHI = null;

// 参照データは非同期で届く。届く前に押されても await で待つ（test_data_pages の規律）。
// catch が拾ってよいのは「データが手に入らなかったこと」だけ。
const inshiReady = fetch("../../assets/inshi_r07.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => { INSHI = d; return true; })
  .catch(() => false);

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "inshi", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

// ── 文書の種類に応じて入力欄を出し分ける（不要な欄に答えさせない・本体と同じ）──
const UNIT_HINT = {
  k1_fudosan: "契約書に記載された契約金額", k1_other: "契約書に記載された契約金額（土地賃貸借は権利金など後日返還されない金額）",
  k2_kensetsu: "契約書に記載された契約金額", k2_other: "契約書に記載された契約金額",
  k3: "手形金額", k4: "券面金額（株券は1株の払込金額×株数）",
  k15: "契約金額", k16: "配当金額", k17_uriage: "文書に記載された受取金額", k17_other: "文書に記載された受取金額",
};
const FIXED = { k5: 1, k6: 1, k7: 1, k8: 1, k9: 1, k10: 1, k11: 1, k12: 1, k13: 1, k14: 1, k18: 1, k19: 1, k20: 1 };
function refreshForm() {
  const doc = $("doc").value;
  const isFixed = !!FIXED[doc];
  $("amount-block").style.display = isFixed ? "none" : "";
  $("tax-block").style.display = /^k1_|^k2_|^k17_/.test(doc) ? "" : "none";
  $("k17-block").style.display = /^k17_/.test(doc) ? "" : "none";
  $("k3-block").style.display = doc === "k3" ? "" : "none";
  $("amount-unit").textContent = "　" + (UNIT_HINT[doc] || "文書に記載された金額");
  postHeight();
}
$("doc").addEventListener("change", refreshForm);
refreshForm();

$("calc").addEventListener("click", async () => {
  const box = $("result");
  box.style.display = "block";
  box.innerHTML = "判定中…"; postHeight();

  const ok = await inshiReady; // 必要な参照データの到着を必ず待つ
  if (!ok || !INSHI) {
    box.innerHTML = `<div class="warn"><b>印紙税額の一覧表を読み込めませんでした。</b>通信環境を確認して再読み込みしてください。一覧表が分からない状態で印紙の額は答えられません。</div>`;
    postHeight(); return;
  }

  const doc = $("doc").value;
  const isFixed = !!FIXED[doc];
  const noamount = !isFixed && $("noamount").checked;
  const amount = Number($("amount").value) || 0;
  if (!isFixed && !noamount && amount <= 0) {
    box.innerHTML = `<div class="warn">記載金額（円）を入力するか、「金額の記載がない文書」にチェックしてください。</div>`; postHeight(); return;
  }

  let r;
  try {
    r = calcInshi({
      doc, amount, noamount,
      taxPart: Number($("taxpart").value) || 0,
      menzei: $("menzei").checked,
      hieigyo: /^k17_/.test(doc) && $("hieigyo").checked,
      ichiranbarai: doc === "k3" && $("ichiranbarai").checked,
    }, INSHI);
  } catch (e) {
    box.innerHTML = `<div class="warn"><b>判定できませんでした。</b>入力を確認してください。（${e.message}）</div>`;
    postHeight(); return;
  }

  const yearTag = INSHI._meta?.year ? `<span class="hint">（${INSHI._meta.year}4月1日現在法令等で判定）</span>` : "";
  const noteHtml = r.notes.length
    ? `<div class="hint" style="margin-top:10px">${r.notes.map((n) => "※ " + n).join("<br>")}</div>` : "";

  if (!r.taxable) {
    box.innerHTML = `
      <div>収入印紙は不要です（非課税） <span class="big">¥0</span></div>
      <div class="hint" style="margin-top:6px">${r.go}文書（${r.docName}）${r.bracketLabel ? `／「${r.bracketLabel}」に当たります` : ""}${r.judgeAmount !== null && r.usedTaxExclusion ? `／判定金額（税抜）: <b>${yen(r.judgeAmount)}</b>` : ""}</div>
      ${noteHtml}
      <div class="note">※ 紙の文書についての判定です。電子契約・電子領収書はそもそも印紙不要。${yearTag}</div>
      <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 印紙税額一覧表・詳しい解説を見る</a></div>`;
    postHeight(); return;
  }

  box.innerHTML = `
    <div>必要な収入印紙${r.perYear ? "（1年ごとに）" : ""} <span class="big">${yen(r.tax)}</span></div>
    <div class="hint" style="margin-top:6px">${r.go}文書（${r.docName}）${r.bracketLabel ? `／金額階級「${r.bracketLabel}」` : ""}${r.keigenApplied ? "／<b>軽減税率を適用</b>" : ""}${r.judgeAmount !== null && r.usedTaxExclusion ? `／判定金額（税抜）: <b>${yen(r.judgeAmount)}</b>` : ""}</div>
    ${noteHtml}
    <div class="note">※ 1通（1冊）あたりの額です。貼ったら印章または署名で消印を。紙の文書についての判定で、電子契約・電子領収書は印紙不要。${yearTag}</div>
    <div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 印紙税額一覧表・詳しい解説を見る</a></div>`;
  postHeight();
});
</script>
</body>
</html>
