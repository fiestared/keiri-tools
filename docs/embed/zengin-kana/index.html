<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>振込名義カナ変換ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/zengin-kana/ と重複させない）。変換は本体と同じ ../../assets/zengin_core.js。
     参照JSONは無い（変換テーブルはcoreに内蔵）ので fetch/await は不要。 -->
<link rel="canonical" href="https://keiri-tools.com/zengin-kana/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="振込名義（受取人名）を全銀フォーマットの半角カナへ一括変換する埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select,textarea{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); font-family:inherit; }
  textarea{ resize:vertical; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  button.sub{ background:#5b6b7b; margin-top:8px; }
  .result{ margin-top:14px; }
  .row{ border:1px solid var(--line); border-radius:8px; padding:9px 11px; margin-bottom:8px; }
  .row .in{ font-size:12px; color:var(--sub); }
  .row .out{ font-size:19px; font-weight:700; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; word-break:break-all; }
  .row .len{ font-size:12px; color:var(--sub); }
  .hint{ font-size:12px; color:var(--sub); }
  .note{ font-size:12px; color:var(--sub); margin-top:6px; }
  .warn{ font-size:12.5px; color:#b4232a; margin-top:6px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  #copyErr{ font-size:12.5px; color:#a33; margin-top:8px; }
  #forceCopy{ display:none; font-size:12px; color:var(--sub); }
</style>
</head>
<body>
<div class="w">
  <h1>振込名義カナ変換（全銀フォーマット）</h1>
  <p class="lead">総合振込の受取人名を1行1名義で貼り付けると、半角カナ・法人略語（株式会社→ｶ)等）・使用可能文字・文字数まで一括で整えます。データはこの枠の外へ送信されません。</p>

  <label for="names">名義リスト（1行1名義）</label>
  <textarea id="names" rows="7" placeholder="株式会社ヤマダ&#10;すずき商店&#10;タナカ健康保険組合"></textarea>
  <button id="run" type="button">全銀フォーマットに変換する</button>

  <div class="result" id="out"></div>
  <button class="sub" id="copyAll" type="button" style="display:none">変換結果をすべてコピー</button>
  <div id="copyErr"></div>
  <a href="#" id="forceCopy">未変換の行も含めてコピーする</a>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/zengin-kana/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の変換エンジンで動いています（全銀協「使用文字一覧」・法人略語一覧）。
  </div>
</div>

<script type="module">
import { normalizeBatch } from "../../assets/zengin_core.js";

const $ = (id) => document.getElementById(id);
const BASE = "https://keiri-tools.com/zengin-kana/?utm_source=embed&utm_medium=widget";
let lastResults = [];

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "zengin-kana", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

function esc(s) {
  return s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

$("run").addEventListener("click", () => {
  const rs = normalizeBatch($("names").value);
  lastResults = rs;
  const out = $("out");
  $("copyErr").textContent = "";
  $("forceCopy").style.display = "none";
  if (!rs.length) {
    out.innerHTML = `<div class="warn">名義を入力してください。</div>`;
    $("copyAll").style.display = "none"; postHeight(); return;
  }
  out.innerHTML = rs.map((r) => `
    <div class="row" style="background:${r.ok ? "#f2f9f6" : "#fff7e6"}">
      <div class="in">${esc(r.input)}</div>
      <div class="out">${esc(r.output) || "（変換結果なし）"}</div>
      <div class="len">${r.length}文字 ${r.ok ? "✓" : ""}</div>
      ${r.warnings.map((w) => `<div class="warn">${esc(w)}</div>`).join("")}
    </div>`).join("")
    + `<div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 変換ルール・使用可能文字の解説を見る</a></div>`;
  $("copyAll").style.display = "block";
  $("copyAll").textContent = copyLabel();
  postHeight();
});

// 未変換の行（漢字が残っている・30文字超）をそのままコピーさせない（総合振込ファイルに貼ると
// 銀行で弾かれるか名義相違で組戻しになる）。行の間引きも危険なので、既定はコピー自体を止める。
function ngRows() {
  return lastResults.map((r, i) => ({ ...r, no: i + 1 })).filter((r) => !r.ok);
}
function copyLabel() {
  const ng = ngRows();
  return ng.length
    ? `⚠ ${ng.length}件が未変換です（${ng.slice(0, 5).map((r) => r.no + "行目").join(" / ")}${ng.length > 5 ? " ほか" : ""}）`
    : "変換結果をすべてコピー";
}

$("copyAll").addEventListener("click", async () => {
  const ng = ngRows();
  if (ng.length) {
    $("copyErr").textContent =
      `${ng.length}件が全銀フォーマットに変換できていません。そのまま振込データに使うと、` +
      `銀行で弾かれるか名義相違で組戻しになります。上の⚠の行を直してから、もう一度押してください。`;
    $("forceCopy").style.display = "inline";
    postHeight(); return;
  }
  await writeAll();
});

$("forceCopy").addEventListener("click", async (e) => {
  e.preventDefault();
  await writeAll();
  $("copyErr").textContent = "未変換の行を含めてコピーしました。振込データに使う前に必ず確認してください。";
  postHeight();
});

async function writeAll() {
  try {
    await navigator.clipboard.writeText(lastResults.map((r) => r.output).join("\n"));
    $("copyAll").textContent = "コピーしました ✓";
    setTimeout(() => ($("copyAll").textContent = copyLabel()), 1500);
  } catch {
    $("copyErr").textContent = "この枠ではコピーできませんでした。上の変換結果を選択してコピーしてください。";
    postHeight();
  }
}
</script>
</body>
</html>
