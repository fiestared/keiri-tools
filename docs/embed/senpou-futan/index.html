<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>振込手数料「先方負担」計算ウィジェット｜keiri-tools</title>
<!-- 埋め込み用ウィジェット: 他サイトが iframe で設置する。canonical で本体ページに集約し、
     このページ自体は noindex（/senpou-futan/ と重複させない）。計算は本体と同じ ../../assets/senpou_core.js。
     コンパクト版は銀行プリセット（fee_table.json）を読み込まず、手数料は利用者が直接入力する。
     参照JSONをfetchしないので await/fail-closed は不要（データが答えの一部にならない）。 -->
<link rel="canonical" href="https://keiri-tools.com/senpou-futan/">
<meta name="robots" content="noindex, follow">
<meta name="description" content="振込手数料が先方負担のとき、請求額からいくら差し引いて振り込むかを計算する埋め込みウィジェット。keiri-tools 提供。">
<style>
  :root{ --ink:#1a2b33; --sub:#5b6b73; --line:#e2e8f0; --accent:#0d9488; --accent2:#e7f3f0; --bg:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6; font-size:15px; padding:14px; }
  .w{ max-width:460px; margin:0 auto; }
  h1{ font-size:16px; margin:0 0 2px; }
  .lead{ font-size:12.5px; color:var(--sub); margin:0 0 12px; }
  label{ display:block; font-size:12.5px; color:var(--sub); margin:8px 0 2px; }
  input,select{ width:100%; padding:8px 10px; font-size:15px; border:1px solid var(--line);
    border-radius:8px; background:#fff; color:var(--ink); }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .radios{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .radios label{ display:flex; align-items:center; gap:5px; margin:0; font-size:13px; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:6px 8px; cursor:pointer; }
  .radios label small{ color:var(--sub); font-size:11px; }
  button{ width:100%; margin-top:12px; padding:11px; font-size:15px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:9px; cursor:pointer; }
  .result{ display:none; margin-top:14px; padding:12px; background:#f7fbfa; border:1px solid var(--line); border-radius:10px; }
  .big{ font-size:26px; font-weight:800; color:var(--accent); }
  .hint{ font-size:12px; color:var(--sub); }
  .row{ margin-bottom:4px; }
  .note{ font-size:12px; color:var(--sub); margin-top:8px; }
  .cta{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .cta a{ font-size:12.5px; text-decoration:none; padding:6px 10px; border-radius:7px; }
  .a-detail{ background:var(--accent2); color:var(--accent); font-weight:700; }
  .brand{ margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:11.5px; color:var(--sub); }
  .brand a{ color:var(--accent); text-decoration:none; font-weight:700; }
  .warn{ font-size:13px; color:#b4232a; }
</style>
</head>
<body>
<div class="w">
  <h1>振込手数料「先方負担」計算</h1>
  <p class="lead">請求額からいくら差し引いて振り込めばよいかを計算します。金額はこの枠の外へ送信されません。</p>

  <label for="invoice">請求額（振込予定額・円）</label>
  <input id="invoice" type="number" inputmode="numeric" placeholder="例: 110000" min="1">

  <label>差引方式（取引先・自社の規程に合わせて選択）</label>
  <div class="radios" id="method">
    <label><input type="radio" name="method" value="sueoki" checked>据置型<small>差引前基準・当方有利</small></label>
    <label><input type="radio" name="method" value="mikan_kasan">未満加算型</label>
    <label><input type="radio" name="method" value="ijo_kasan">以上加算型<small>差引後基準・先方有利</small></label>
    <label><input type="radio" name="method" value="flat">一律差引</label>
  </div>

  <div id="fee-inputs">
    <div class="grid">
      <div>
        <label for="feeUnder">振込手数料 3万円未満（円）</label>
        <input id="feeUnder" type="number" inputmode="numeric" placeholder="例: 220">
      </div>
      <div>
        <label for="feeOver">振込手数料 3万円以上（円）</label>
        <input id="feeOver" type="number" inputmode="numeric" placeholder="例: 440">
      </div>
    </div>
  </div>

  <div id="flat-input" style="display:none">
    <label for="flatFee">差し引く固定額（円）</label>
    <input id="flatFee" type="number" inputmode="numeric" value="550">
  </div>

  <button id="calc" type="button">計算する</button>

  <div class="result" id="result"></div>

  <div class="brand">
    🧮 <a id="brand-link" href="https://keiri-tools.com/senpou-futan/?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">keiri-tools</a>
    の計算エンジンで動いています（銀行実務の3方式＋一律差引）。
  </div>
</div>

<script type="module">
import { calc, calcFlat, METHODS, methodsDisagree } from "../../assets/senpou_core.js";

const $ = (id) => document.getElementById(id);
const yen = (n) => n.toLocaleString("ja-JP") + " 円";
const BASE = "https://keiri-tools.com/senpou-futan/?utm_source=embed&utm_medium=widget";

// 高さを親フレームへ通知（他サイトの iframe が中身に合わせてリサイズできるように）
function postHeight() {
  const h = Math.ceil(document.documentElement.getBoundingClientRect().height) + 2;
  try { parent.postMessage({ type: "keiri-embed", widget: "senpou-futan", height: h }, "*"); } catch {}
}
addEventListener("load", postHeight);
addEventListener("resize", postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);

document.querySelectorAll('input[name="method"]').forEach((r) =>
  r.addEventListener("change", () => {
    const flat = document.querySelector('input[name="method"]:checked').value === "flat";
    $("fee-inputs").style.display = flat ? "none" : "";
    $("flat-input").style.display = flat ? "" : "none";
    postHeight();
  })
);

$("calc").addEventListener("click", () => {
  const invoice = Number($("invoice").value);
  const method = document.querySelector('input[name="method"]:checked').value;
  const box = $("result");
  box.style.display = "block";
  if (!invoice || invoice <= 0) { box.innerHTML = `<div class="warn">請求額を入力してください。</div>`; postHeight(); return; }

  if (method === "flat") {
    const flatFee = Number($("flatFee").value) || 0;
    const r = calcFlat(invoice, flatFee);
    box.innerHTML = render(invoice, r.fee, r.transfer);
    postHeight(); return;
  }
  if ($("feeUnder").value === "" || $("feeOver").value === "") {
    box.innerHTML = `<div class="warn">振込手数料（3万円未満／以上）を入力してください。</div>`; postHeight(); return;
  }
  const feeTable = { under30k: Number($("feeUnder").value), over30k: Number($("feeOver").value) };
  const r = calc(method, invoice, feeTable);
  let html = render(invoice, r.fee, r.transfer, METHODS[method].label);
  if (methodsDisagree(invoice, feeTable)) {
    const rows = ["sueoki", "mikan_kasan", "ijo_kasan"].map((m) => {
      const x = calc(m, invoice, feeTable);
      return `${METHODS[m].label}: 差引 ${yen(x.fee)} → 振込 ${yen(x.transfer)}`;
    });
    html += `<div class="note">この請求額は3万円境界の付近で、<b>方式によって差引額が変わります</b>。取引先の規程を確認してください。<br>${rows.join("<br>")}</div>`;
  }
  html += `<div class="cta"><a class="a-detail" href="${BASE}" target="_blank" rel="noopener">▶ 3方式の違い・仕訳の解説を見る</a></div>`;
  box.innerHTML = html;
  postHeight();
});

function render(invoice, fee, transfer, methodLabel) {
  // ★手数料が請求額以上の少額請求で、マイナス（や0円）の振込額を黙って出さない（本体ページと同じ）
  const warn = transfer <= 0
    ? `<div class="warn"><b>差し引く手数料（${yen(fee)}）が請求額（${yen(invoice)}）以上のため、振込額が${transfer < 0 ? "マイナスに" : "0円に"}なります。</b>手数料を当方負担にするか、取引先と取り決めを確認してください。</div>`
    : "";
  return `
    <div class="row">振込額 <span class="big">${yen(transfer)}</span></div>
    <div class="row hint">差し引く手数料: ${yen(fee)}（請求額 ${yen(invoice)}${methodLabel ? "・" + methodLabel : ""}）</div>${warn}`;
}
</script>
</body>
</html>
